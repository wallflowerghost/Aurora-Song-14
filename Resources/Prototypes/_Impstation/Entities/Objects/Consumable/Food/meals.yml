# pompom foods

- type: entity
  name: cheese squeaks
  parent: FoodMealBase
  id: FoodMealCheeseSqueaks
  description: Fried fabric treats, filled with string cheese and served with sauce.
  components:
  - type: FlavorProfile
    flavors:
      - cheesy
    ignoreReagents:
      # - CottonBool - Aurora's Song - Removed CottonBool (doesnt exist here)
      - Nutriment
  - type: Sprite
    state: cheesesqueaks
    sprite: _Impstation/Objects/Consumable/Food/Cloth/cheesesqueaks.rsi
  - type: Item
    heldPrefix: cheese squeaks
  - type: Edible
    requiresSpecialDigestion: true
    trash:
    - FoodPacketFoodBoatTrash
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 45
        reagents:
        - ReagentId: Nutriment # - Aurora's Song - Increased Nutriment
          Quantity: 20
        - ReagentId: TableSalt
          Quantity: 5
        - ReagentId: Fiber
          Quantity: 10
        # - ReagentId: CottonBool - Aurora's Song - Removed CottonBool (doesnt exist here)
        #   Quantity: 10
  - type: Tag
    tags:
    # - ClothFood - Aurora's Song
    - ClothMade
  - type: MothFood # - Aurora's Song

