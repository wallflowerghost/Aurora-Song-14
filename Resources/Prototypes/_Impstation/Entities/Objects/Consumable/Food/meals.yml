- type: entity
  categories: [ HideSpawnMenu ]
  parent: FoodPacketTrash
  id: FoodPacketFoodBoatTrash
  name: paper food boat
  description: Holds food. Shaped like a boat.
  components:
  - type: Sprite
    sprite: _Impstation/Objects/Consumable/Food/Cloth/cheesesqueaks.rsi
    state: food-boat
  - type: Tag
    tags:
    - Trash
