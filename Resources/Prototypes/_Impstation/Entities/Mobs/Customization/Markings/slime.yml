# Chest

- type: marking
  id: bubble
  bodyPart: Chest
  markingCategory: Chest
  speciesRestriction: [ SlimePerson ]
  forcedColoring: false
  followSkinColor: false
  sprites:
  - sprite: _Impstation/Mobs/Customization/animatedmarkings.rsi
    state: bubble

- type: marking
  id: fishbowl
  bodyPart: Chest
  markingCategory: Chest
  speciesRestriction: [ SlimePerson ]
  forcedColoring: false
  followSkinColor: false
  sprites:
  - sprite: _Impstation/Mobs/Customization/animatedmarkings.rsi
    state: fishbowl1
  - sprite: _Impstation/Mobs/Customization/animatedmarkings.rsi
    state: fishbowl2

- type: marking
  id: SlimeBonechest
  bodyPart: Chest
  markingCategory: Chest
  speciesRestriction: [SlimePerson]
  followSkinColor: false
  coloring:
    default:
      type:
        !type:SimpleColoring
          color: "#F8F8F8"
  sprites:
  - sprite: _Impstation/Mobs/Customization/slime_parts.rsi
    state: bonechest

- type: marking
  id: SlimeCore
  bodyPart: Chest
  markingCategory: Chest
  speciesRestriction: [SlimePerson]
  followSkinColor: true
  sprites:
  - sprite: _Impstation/Mobs/Customization/slime_parts.rsi
    state: core

- type: marking
  id: SlimeCoreGlowing
  bodyPart: Chest
  markingCategory: Chest
  speciesRestriction: [ SlimePerson ]
  followSkinColor: false
  coloring:
    default:
      type:
        !type:EyeColoring
  sprites:
  - sprite: _Impstation/Mobs/Customization/SlimePerson/chest.rsi
    state: core
  shader: unshaded

- type: marking
  id: SlimeLungs
  bodyPart: Chest
  markingCategory: Chest
  speciesRestriction: [SlimePerson]
  followSkinColor: true
  sprites:
  - sprite: _Impstation/Mobs/Customization/slime_parts.rsi
    state: lungs

