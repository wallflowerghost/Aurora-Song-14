- type: entity
  name: Urist McSheepy
  parent:
  - AppearanceOvinia
  - BaseSpeciesMobOrganic
  id: MobOvinia
  components:
  - type: Fixtures
    fixtures: # TODO: This needs a second fixture just for mob collisions.
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 215 # sheep be heavy
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageModifierSet: Ovinia
  - type: Speech
    speechSounds: Alto
    speechVerb: Ovinia
  - type: Vocal
    sounds:
      Male: MaleOvinia
      Female: FemaleOvinia
      Unsexed: MaleOvinia
  - type: Tag
    tags:
    - CanPilot
    - FootstepSound
    - DoorBumpOpener
    - AnomalyHost
    - OviniaEmotes
  - type: ProtectedFromStepTriggers
    #whitelist:
    #  types:
    #    - Shard
    #    - Mousetrap
    #    - SlipEntity //Removed - Delta-V
  - type: TypingIndicator
    proto: ovinia
  - type: Hunger
    baseDecayRate: 0.015 #25% slower than normal (chewin they cud) # Aurora's Song - Scales hunger to match Frontier Standards
  - type: Thirst
    baseDecayRate: 0.075 #25% slower than normal

