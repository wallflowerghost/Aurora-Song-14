- type: entity
  id: CigPackJoint
  parent: CigPackBase
  name: Stinky Steve's packet
  description: A commercialized alternative to homebrewed herbalism for recreational use. This one comes with pre-rolled joints.
  components:
  - type: Sprite
    sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/stinkyjoints.rsi
  - type: Item
    sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/stinkyjoints.rsi
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: Joint
          amount: 10

- type: entity
  id: CigPackMnemolith
  parent: CigPackBase
  name: Mnemolith Cigarettes
  description: "Cigarettes containing powdered mnemolith, used by mantes to heighten their extrasensory perception. Potential psychological impact aside, there are no known lasting effects."
  components:
  - type: Sprite
    sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/mantis.rsi
    layers:
    - state: closed
    - state: open
      map: ["openLayer"]
      visible: false
    - state: cig1
      map: ["cig1"]
      sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/mantis-visualizer.rsi
      visible: false
    - state: cig2
      map: ["cig2"]
      sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/mantis-visualizer.rsi
      visible: false
    - state: cig3
      map: ["cig3"]
      sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/mantis-visualizer.rsi
      visible: false
    - state: cig4
      map: ["cig4"]
      sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/mantis-visualizer.rsi
      visible: false
    - state: cig5
      map: ["cig5"]
      sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/mantis-visualizer.rsi
      visible: false
    - state: cig6
      map: ["cig6"]
      sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/mantis-visualizer.rsi
      visible: false
  - type: Item
    sprite: _DEN/Objects/Consumable/Smokeables/Cigarettes/Packs/mantis.rsi
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: CigaretteMnemolith
          amount: 10
  - type: Tag
    tags:
    - CigPack
    - Trash
    - MantisBeltStorable
