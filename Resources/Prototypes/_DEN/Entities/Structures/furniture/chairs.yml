    state: somberleather
  - type: Damageable
    damageModifierSet: Wood
    damageContainer: Inorganic
  - type: StaticPrice
    price: 125
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
    - trigger:
