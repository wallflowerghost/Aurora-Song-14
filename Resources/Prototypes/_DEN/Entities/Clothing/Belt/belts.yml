  id: ClothingBeltMantisAiryLoot
  categories: [ HideSpawnMenu ]
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: MantisMeleeSickle
        #- id: BoxFolderMantis # Aurora: We don't have this
        - id: CigPackMnemolith
        - id: FlippoLighterMantis
