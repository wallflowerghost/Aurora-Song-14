- type: markingsGroup
  parent: Undergarments
  id: Rodentia
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ RodentiaTailDefault ]
    enum.HumanoidVisualLayers.LArm:
      limit: 8 # Aurora 1<8
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 8 # Aurora 1<8
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 8 # Aurora 1<8
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 8 # Aurora 1<8
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 8 # Aurora 1<8
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 8 # Aurora 1<8
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 8 # Aurora 1<8
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 8 # Aurora 1<8
      required: false
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ RodentiaHeadTopEarDefault ]
    enum.HumanoidVisualLayers.HeadSide:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Chest:
      limit: 2
      required: false

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceRodentia
  name: rodentia appearance
  components:
  - type: Inventory
    speciesId: rodentia
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganRodentiaTorso
      Head: OrganRodentiaHead
      ArmLeft: OrganRodentiaArmLeft
      ArmRight: OrganRodentiaArmRight
      HandRight: OrganRodentiaHandRight
      HandLeft: OrganRodentiaHandLeft
      LegLeft: OrganRodentiaLegLeft
      LegRight: OrganRodentiaLegRight
      FootLeft: OrganRodentiaFootLeft
      FootRight: OrganRodentiaFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganAnimalHeart
      Stomach: OrganAnimalStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Rodentia
  - type: Sprite
    # scale: 0.8, 0.8 Aurora's Song - standardized them to human size by commenting this out. The default is 1,1

- type: entity
  parent:
  - AppearanceRodentia
  - BaseSpeciesMobOrganic
  id: MobRodentia
  name: Urist McRat
  components:
  - type: Hunger
    baseDecayRate: 0.0266 # 33% faster than usual
  - type: Speech
    speechVerb: Rodentia
    speechSounds: Squeak
    allowedEmotes: ['Squeak', 'Belch'] # Frontier - Add Belch
#  Aurora's Song - Standardize fixtures
#  - type: Fixtures
#    fixtures: # TODO: This needs a second fixture just for mob collisions.
#      fix1:
#        shape:
#          !type:PhysShapeCircle
#          radius: 0.28
#        density: 140
#        restitution: 0.0
#        mask:
#        - MobMask
#        layer:
#        - MobLayer
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Blunt: 2
        Slash: 3
  - type: Damageable
    damageModifierSet: Rodentia
  - type: Butcherable
    spawned:
    - id: FoodMeatRat
      amount: 5
  - type: TypingIndicator
    proto: rodentia
  - type: Vocal
    sounds:
      Male: MaleRodentia
      Female: FemaleRodentia
      Unsexed: MaleRodentia
  - type: Rummager
  - type: AlwaysTriggerMousetrap
  - type: PseudoItem
    storedOffset: -10,0
    shape:
      - 0, 0, 3, 2
      - 0, 2, 5, 4
  - type: MouthStorage # Aurora: removed cheek storage for now (It's tied into an antiquated system that was reworked)
    mouthProto: CheekStorage
    openStorageAction: ActionOpenMouthStorage
    spitDamageThreshold: 3
  - type: CrawlUnderObjects
    actionProto: ActionToggleSneakMode

- type: entity
  parent: OrganBase
  id: OrganRodentia
  abstract: true
  suffix: rodentia

- type: entity
  parent: OrganRodentia
  id: OrganRodentiaExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _DV/Mobs/Species/Rodentia/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _DV/Mobs/Species/Rodentia/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Rodentia

