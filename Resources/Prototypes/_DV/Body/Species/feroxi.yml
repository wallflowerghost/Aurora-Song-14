- type: markingsGroup
  parent: Undergarments
  id: Feroxi
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Head:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.HeadTop:
      limit: 1
      required: true
      default: [ FeroxiEars ]
    enum.HumanoidVisualLayers.Snout:
      limit: 1
      required: true
      default: [ FeroxiSnout ]
    enum.HumanoidVisualLayers.Chest:
      limit: 3
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ FeroxiTailAndDorsal ]

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceFeroxi
  name: feroxi appearance
  components:
  - type: Inventory
    speciesId: feroxi
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganFeroxiTorso
      Head: OrganFeroxiHead
      ArmLeft: OrganFeroxiArmLeft
      ArmRight: OrganFeroxiArmRight
      HandRight: OrganFeroxiHandRight
      HandLeft: OrganFeroxiHandLeft
      LegLeft: OrganFeroxiLegLeft
      LegRight: OrganFeroxiLegRight
      FootLeft: OrganFeroxiFootLeft
      FootRight: OrganFeroxiFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganFeroxiLungs
      Heart: OrganAnimalHeart
      Stomach: OrganFeroxiStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Feroxi

- type: entity
  parent:
  - AppearanceFeroxi
  - BaseSpeciesMobOrganic
  id: MobFeroxi
  name: Urist McFin
  components:
  - type: Thirst
    baseDecayRate: 0.2
  - type: Speech
    speechSounds: Tenor
    speechVerb: Feroxi
    allowedEmotes: [ "Gnash" ]
  - type: Vocal
    sounds:
      Male: MaleFeroxi
      Female: FemaleFeroxi
      Unsexed: MaleFeroxi
  - type: MeleeWeapon
    hidden: true
    soundHit:
      path: /Audio/Effects/bite.ogg
    angle: 30
    animation: WeaponArcBite
    damage:
      types:
        Piercing: 7 # oooh scary extra damage~
  - type: Damageable
    damageModifierSet: Feroxi
  - type: TypingIndicator
    proto: feroxi
  - type: FeroxiDehydrate
    hydratedMetabolizer: Feroxi
    dehydratedMetabolizer: FeroxiDehydrated
    dehydrationThreshold: 150

- type: entity
  parent: OrganBase
  id: OrganFeroxi
  abstract: true
  suffix: Feroxi

- type: entity
  id: OrganFeroxiMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Feroxi, Animal ] # I hope having animal here won't break anything

- type: entity
  parent: OrganFeroxi
  id: OrganFeroxiInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  parent: OrganFeroxi
  id: OrganFeroxiExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _DV/Mobs/Species/Feroxi/parts.rsi
  - type: VisualOrgan
    data:
      sprite: _DV/Mobs/Species/Feroxi/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Feroxi

- type: entity
