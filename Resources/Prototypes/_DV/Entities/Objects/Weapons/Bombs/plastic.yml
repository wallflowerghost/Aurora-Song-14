- type: entity
  name: breaching charge
  description: A breaching explosive for security officers to break through walls.
  parent: [SeismicCharge, BaseC2ContrabandUnredeemable] # Frontier: added BaseC2ContrabandUnredeemable
  id: BreachingCharge
  components:
  - type: Sprite
    sprite: _DV/Objects/Weapons/Bombs/breaching.rsi
    state: icon
    layers:
    - state: icon
      map: ["base"]
  - type: TimerTrigger # Aurora's Song - OnUseTimerTrigger>TimerTrigger
    delay: 10
    delayOptions: [10, 15, 20, 25]
    initialBeepDelay: 0
    beepSound:
      path: /Audio/Effects/Cargo/buzz_two.ogg
      params:
        volume: -6
  - type: ToggleTriggerCondition # Aurora's Song - Replace start on stuck
    keys:
    - stuck
    toggleVerb: toggle-trigger-condition-stick-verb
    toggleOn: toggle-trigger-condition-stick-on
    toggleOff: toggle-trigger-condition-stick-off
  - type: Explosive
    explosionType: DemolitionCharge
    totalIntensity: 10
    intensitySlope: 10
    maxIntensity: 10
    canCreateVacuum: false
