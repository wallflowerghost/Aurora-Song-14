- type: entity
  name: psi-breaker
  parent: BaseWeaponPistol
  id: WeaponPistolPsiBreaker
  suffix: DO NOT MAP # Mantes shouldn't get free lethals
  description: "A gloomy pistol with an amaranth grip. Provides no tactical advantage. Uses .38 special ammo." # TheDen
  components:
  - type: Sprite
    sprite: _DV/Objects/Weapons/Guns/Pistols/psibreaker.rsi
  - type: Gun
    fireRate: 3.5
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/pistol.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        #startingItem: MagazinePistolSpecialMindbreaker # Aurora: Comment out until caster port
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazinePistolSpecial
      gun_chamber:
        name: Chamber
        #startingItem: CartridgeSpecialMindbreaker # Aurora: Comment out until caster port
        priority: 1
        whitelist:
          tags:
          - CartridgeSpecial
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: Clothing # TheDen
    sprite: _DV/Objects/Weapons/Guns/Pistols/psibreaker.rsi
    quickEquip: false
    slots:
    - Belt
    - suitStorage
  - type: Tag # TheDen
    tags:
    - Sidearm
    - MantisBeltStorable
