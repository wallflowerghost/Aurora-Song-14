- type: species
  id: SlimePerson
  name: species-name-slime
  roundStart: true
  prototype: MobSlimePerson
  sprites: MobSlimeSprites
  defaultSkinTone: "#b8b8b8"
  markingLimits: MobSlimeMarkingLimits
  dollPrototype: MobSlimePersonDummy
  skinColoration: HumanAnimal # Aurora's Song - Replaced with HumanAnimal
#  customName: true

- type: speciesBaseSprites
  id: MobSlimeSprites
  sprites:
    Head: MobSlimeHead
    Hair: MobSlimeMarkingFollowSkin
    FacialHair: MobSlimeMarkingFollowSkin
    Snout: MobSlimeMarkingFollowSkin
    UndergarmentBottom: MobHumanoidAnyMarking
    UndergarmentTop: MobHumanoidAnyMarking
    Chest: MobSlimeTorso
    HeadTop: MobSlimeMarkingFollowSkinNoAlpha # Aurora's Song | Matches alpha with base to make animal ears seemless.
    HeadSide: MobSlimeMarkingFollowSkin
    Tail: MobSlimeMarkingFollowSkinNoAlpha # Aurora's Song | Matches alpha with base to make animal tails seemless.
#    Wings: MobSlimeMarkingFollowSkin //Need to work on this, Den has a different visual layer composition
    Eyes: MobHumanoidEyes
    LArm: MobSlimeLArm
    RArm: MobSlimeRArm
    LHand: MobSlimeLHand
    RHand: MobSlimeRHand
    LLeg: MobSlimeLLeg
    RLeg: MobSlimeRLeg
    LFoot: MobSlimeLFoot
    RFoot: MobSlimeRFoot

- type: markingPoints
  id: MobSlimeMarkingLimits
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Tail:
      points: 1
      required: false
#    Wings:
#      points: 1
#      required: false
    Snout:
      points: 1
      required: false
    Head:
      points: 1
      required: true # Aurora's Song | Base head marking to allow for animal heads
      defaultMarkings: [SlimeHead] # Aurora's Song | Base head marking to allow for animal heads
    HeadTop:
      points: 2
      required: false
    HeadSide:
      points: 2
      required: false
    Chest:
      points: 4 # imp 1<4
      required: false
    Genitals:
      points: 1
      required: false
    Nipples:
      points: 2
      required: false
    UndergarmentBottom:
      points: 1
      required: false
    UndergarmentTop:
      points: 1
      required: false
    Arms:
      points: 8 # Aurora: 4>8
      required: false
    Legs:
      points: 8 # Aurora: 4>8
      required: false

- type: humanoidBaseSprite
  id: MobSlimeMarkingFollowSkin
  markingsMatchSkin: true
  layerAlpha: 0.75 # imp 0.72<0.75

- type: humanoidBaseSprite # Aurora's Song | Ivisible base head for custom head markings
  id: MobSlimeHead
  markingsMatchSkin: true

- type: humanoidBaseSprite # Aurora's Song | Ivisible base head for custom head markings
  id: MobSlimeHeadMale
  markingsMatchSkin: true

- type: humanoidBaseSprite # Aurora's Song | Ivisible base head for custom head markings
  id: MobSlimeHeadFemale
  markingsMatchSkin: true

- type: humanoidBaseSprite # Aurora's Song | Matches skin colour but not alpha
  id: MobSlimeMarkingFollowSkinNoAlpha
  markingsMatchSkin: true

- type: humanoidBaseSprite
  id: MobSlimeTorso
  baseSprite:
    sprite: Mobs/Species/Slime/parts.rsi
    state: torso_m

- type: humanoidBaseSprite
  id: MobSlimeTorsoMale
  baseSprite:
    sprite: Mobs/Species/Slime/parts.rsi
    state: torso_m

- type: humanoidBaseSprite
  id: MobSlimeTorsoFemale
  baseSprite:
    sprite: Mobs/Species/Slime/parts.rsi
    state: torso_f

- type: humanoidBaseSprite
  id: MobSlimeLLeg
  baseSprite:
    sprite: Mobs/Species/Slime/parts.rsi
    state: l_leg

- type: humanoidBaseSprite
  id: MobSlimeLArm
  baseSprite:
    sprite: Mobs/Species/Slime/parts.rsi
    state: l_arm

- type: humanoidBaseSprite
  id: MobSlimeLHand
  baseSprite:
    sprite: Mobs/Species/Slime/parts.rsi
    state: l_hand

- type: humanoidBaseSprite
  id: MobSlimeLFoot
  baseSprite:
    sprite: Mobs/Species/Slime/parts.rsi
