- type: marking # Aurora's Song | Base head into Marking for custom heads
  id: SlimeHead
  bodyPart: Head
  markingCategory: Head
  speciesRestriction: [SlimePerson]
  sprites:
  - sprite: Mobs/Species/Slime/parts.rsi
    state:  head_m
