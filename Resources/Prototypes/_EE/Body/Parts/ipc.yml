- type: entity
  id: PartIPC
  parent: [BaseItem, BasePart] # Aurora's Song - Refactor IPCs to inherit from base parts
  name: "ipc body part"
  abstract: true
  components:
  - type: Damageable
    damageContainer: Inorganic # Shitmed Change
  - type: BodyPart
  - type: ContainerContainer
    containers:
      bodypart: !type:Container
        ents: []
  - type: StaticPrice
    price: 100

- type: entity
  id: TorsoIPC
  name: "ipc torso"
  parent: [PartIPC, BaseTorso] # Aurora's Song
  components:
  - type: Sprite
    netsync: false
    sprite: _EE/Mobs/Species/IPC/parts.rsi
    state: "torso_m"
  - type: Icon
    sprite: _EE/Mobs/Species/IPC/parts.rsi
    state: "torso_m"

