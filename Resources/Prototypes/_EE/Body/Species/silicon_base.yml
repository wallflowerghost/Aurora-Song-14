- type: entity
  save: false
  id: PlayerSiliconHumanoidBase
  parent: # Aurora's Song - Reformated to use species_base. In line with nubody changes.
  - BaseSpeciesMob
  - MobAtmosExposed
  - MobFlammable
  abstract: true
  components:
    - type: Reactive
      groups:
        Flammable: [Touch]
        Extinguish: [Touch]
        Acidic: [Touch]
      reactions:
        - reagents: [Water, SpaceCleaner]
          methods: [Touch]
          effects:
            - !type:WashCreamPie # Aurora's Song - WashCreamPieReaction>WashCreamPie
    - type: Damageable
      damageContainer: HumanoidSilicon # DeltaV - change from Silicon
      damageModifierSet: IPC
    - type: ZombieImmune
    - type: Silicon
      entityType: enum.SiliconType.Player
      batteryPowered: false # Needs to also have a battery!
      chargeThresholdMid: 0.60
      chargeThresholdLow: 0.30
      chargeThresholdCritical: 0
      speedModifierThresholds:
        4: 1
        3: 1
        2: 0.80
        1: 0.45
        0: 0.00
    - type: Temperature # Aurora's Song - Move temperature stuff out of TemperatureDamage
      currentTemperature: 310.15
      specificHeat: 42
      atmosTemperatureTransferEfficiency: 0.05
    - type: TemperatureDamage # Aurora's Song - Temperature>TemperatureDamage
      heatDamageThreshold: 1800 # GoobStation: Roughly the melting point of mild steels
      coldDamageThreshold: 100 # DeltaV - has to be very cold
      coldDamage:
        types:
          Cold: 0.1 #per second, scales with temperature & other constants
      heatDamage:
        types:
          Heat: 2 # DeltaV - was 3
    - type: HealthExaminable
      examinableTypes:
        - Blunt
        - Slash
        - Piercing
        - Heat
        - Shock
    - type: StatusEffects
      allowed:
        - Stun
        - KnockedDown
        - SlowedDown
        - Stutter
        - SeeingRainbows
        - Electrocution
        - SlurredSpeech
        - PressureImmunity
        - Muted
        - TemporaryBlindness
        - Pacified
        - Flashed # Goobstation
    - type: LightningTarget
      priority: 1
      lightningExplode: false
    - type: Deathgasp
      prototype: SiliconDeathgasp
      needsCritical: false
    - type: MobState
      allowedStates:
        - Alive
        - Dead
    - type: MobThresholds
      thresholds:
        0: Alive
        165: Dead
    - type: Icon
      sprite: _EE/Mobs/Species/IPC/parts.rsi
      state: full
    - type: Flammable
      fireSpread: true
      canResistFire: true
      damage:
        types:
          Heat: 0.75 #per second, scales with number of fire 'stacks'
    - type: Tag
      tags:
        - CanPilot
        - FootstepSound
        - DoorBumpOpener
        - AnomalyHost
        - SiliconOrIPCEmotes # DeltaV
    - type: UserInterface
      interfaces:
        enum.VoiceMaskUIKey.Key:
          type: VoiceMaskBoundUserInterface
        enum.HumanoidMarkingModifierKey.Key:
          type: HumanoidMarkingModifierBoundUserInterface
        enum.StrippingUiKey.Key:
          type: StrippableBoundUserInterface
    - type: Speech
      speechSounds: Pai
    - type: Vocal
      wilhelm: "/Audio/_EE/Voice/IPC/wilhelm.ogg"
      sounds:
        Male: UnisexIPC
        Female: UnisexIPC
        Unsexed: UnisexIPC
    - type: FireVisuals
      alternateState: Standing
    - type: StunVisuals
    - type: Blindable
    - type: ToggleUndergarment # Aurora's Song - Add undergarment toggle
    - type: Carriable # Aurora's Song - Move carriable to species base

