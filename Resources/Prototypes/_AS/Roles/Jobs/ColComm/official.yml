- type: job
  id: ColonialCommandOfficial
  name: job-name-colcomoff
  description: job-description-colcomoff
  playTimeTracker: JobColonialCommandOfficial
  setPreference: false
  startingGear: ColcomGear
  icon: "JobIconColonialCommandOfficial"
  supervisors: job-supervisors-hos
  canBeAntag: false
