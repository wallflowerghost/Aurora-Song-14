    jumpsuit: ASClothingUniformJumpsuitColcommFormal
    shoes: ClothingShoesBootsCombatFilled
    head: ASClothingHeadHatColonialOfficialBeretBig
    eyes: ClothingEyesGlassesCommand
    gloves: ASClothingHandsGlovesColonialOfficial
    outerClothing: ASClothingOuterArmorColonialOfficialCarapace
    id: ColcomPDA
    ears: ClothingHeadsetAltColCom
    belt: NFWeaponPistolN1984 # Frontier
    pocket1: BoxFolderBlack
    pocket2: PenColcom


