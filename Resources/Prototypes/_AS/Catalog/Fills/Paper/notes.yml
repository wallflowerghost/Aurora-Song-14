      [bold]COLD-AIR-VOX (CAV) ROOM LEVER INSTRUCTION[/bold]

      [bold]Left:[/bold] COLD ATMOSPHERE - The rooms' air will be replaced with air at a sub-zero temperature. (The longer this one is enabled the longer it will take to heat the room back up afterwards - to a point)

      [bold]Middle:[/bold] REGULAR ATMOSPHERE - Regular air mix will replace whatever mix is in the room gradually.

      [bold]Right:[/bold] VOX ATMOSPHERE- Oxygen will be drained, replaced gradually with nitrogen.

      This room has been outfitted with a robust, adjustable HVAC system suited for any race. Each change will take at least a minute to fully complete the transition - with varying times depending on certain conditions.

      Signed,
      JH, Atmospheric Consultant

