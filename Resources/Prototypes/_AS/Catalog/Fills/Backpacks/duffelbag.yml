#region SLE

- type: entity
  parent: ASClothingBackpackDuffelSLENavy
  id: ASClothingBackpackDuffelSLETrackingBundle
  name: NGP-40 tracking bundle
  description: "All the equipment needed to track almost anything, careful tracking people."
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: NFWeaponLauncherGrenadeNfsd
        - id: NFBoxDartsTracking

