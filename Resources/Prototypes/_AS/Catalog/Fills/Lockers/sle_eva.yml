#region Locker
- type: entity
  parent: [ASLockerBaseSecure, LockerEvacRepair]
  id: ASLockerEVASLE
  name: SLE EVA locker
  components:
  - type: EntityStorageVisuals
    stateBaseClosed: sle
    stateDoorOpen: sle_open
    stateDoorClosed: sle_door
  - type: AccessReader
    access: [ [ "Security" ] ]

#region Fills
- type: entity
  parent: ASLockerEVASLE
  id: ASLockerEVASLEFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ASClothingOuterEVASuitSLE
          amount: 2
        - id: ASClothingShoesBootsMagSLEFilled
          amount: 2
        - id: ASJetpackSLEFilled
          amount: 2
        - id: GasAnalyzer
        - id: HolofanProjector

- type: entity
  parent: ASLockerWallEVAColorSLE
  id: ASLockerWallEVAColorSLEFilled
  suffix: Filled
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ASClothingOuterEVASuitSLE
        - id: ASJetpackSLEFilled
        - id: ClothingShoesBootsMag
        - id: DoubleEmergencyTankO2N2EqualFilled
