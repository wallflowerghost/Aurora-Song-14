- type: entity
  abstract: true
  parent: ASClothingRigStorageHolsterBase
  id: ASClothingSRigStorageHolsterMedkitBase
  components:
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: ItemSlots # add medkit slot
    slots:
      holster:
        name: clothing-belt-sidearm
        priority: 4 # higher number is higher priority
        whitelist:
          tags:
          - Sidearm
          - Knife # add knife to whitelist
        insertOnInteract: true
      medkit:
        name: clothing-belt-medkit
        priority: 3
        whitelist:
          tags:
          - Medkit
        insertOnInteract: true
  - type: Appearance
  - type: ItemMapper # add stowed medkit sprite
    mapLayers:
      baton_rig:
        whitelist:
          components:
          - Stunbaton
      gasgrenade:
        whitelist:
          tags:
            - Grenade
      slp_rig:
        whitelist:
          tags:
          - Sidearm
      knife_rig: # add knife sprite mapping
        whitelist:
          tags:
          - Knife
      medkit_rig:
        whitelist:
          tags:
          - Medkit
    sprite: _DV/Clothing/Belt/belt_overlay.rsi
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      holster: !type:ContainerSlot {}
      medkit: !type:ContainerSlot {}
