- type: entity
  abstract: true
  parent: NFClothingBeltStorageHolsterBase
  id: ASClothingBeltStorageHolsterBase
  components:
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: ItemSlots # DeltaV - add sidearm slot
    slots:
      holster:
        name: clothing-belt-sidearm
        whitelist:
          tags:
          - Sidearm
          - Knife # added knife to whitelist
        insertOnInteract: true
  - type: Appearance
  - type: ItemMapper # DeltaV - adjust for DeltaV sprites.
    mapLayers:
      baton_beltalt:
        whitelist:
          components:
          - Stunbaton
      gasgrenade:
        whitelist:
          tags:
            - Grenade
      slp_beltalt:
        whitelist:
          tags:
          - Sidearm
      knife: # add knife sprite mapping
        whitelist:
          tags:
          - Knife
    sprite: _DV/Clothing/Belt/belt_overlay.rsi
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      holster: !type:ContainerSlot {}

