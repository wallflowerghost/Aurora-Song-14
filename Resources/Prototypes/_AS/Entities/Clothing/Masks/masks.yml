- type: entity
  parent: [ BaseC2ContrabandUnredeemable, ClothingMaskGasSecurity ]
  id: ASClothingMaskGasSLE
  name: SLE gas mask
  description: A standard issue Sector Law Enforcement gas mask.
  components:
  - type: Sprite
    sprite: _AS/Clothing/Mask/sle.rsi
  - type: Clothing
    sprite: _AS/Clothing/Mask/sle.rsi
  - type: CatWearable

- type: entity
  parent: [ BaseC2ContrabandUnredeemable, ClothingMaskGasSwat ]
  id: ASClothingMaskGasSLECommissioner
  name: SLE commissioner gas mask
  description: A gas mask worthy of an SLE Commissioner.
  components:
  - type: Sprite
    sprite: _AS/Clothing/Mask/sle_commissioner.rsi
  - type: Clothing
    sprite: _AS/Clothing/Mask/sle_commissioner.rsi

#region Colonial Command

- type: entity
  parent: [ ClothingMaskGasERT, BaseCentcommContraband ]
  id: ClothingMaskGasCAF
  name: caf gas mask
  description: The gas mask of the elite squad of the CAF.
  components:
  - type: Sprite
    sprite: Clothing/Mask/ert.rsi
  - type: Clothing
    sprite: Clothing/Mask/ert.rsi
  - type: Tag
    tags:
    - WhitelistChameleon
  - type: HideLayerClothing
    slots:
    - Hair
    - Snout
    hideOnToggle: true
  - type: FlashImmunity
  - type: EyeProtection
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
  - type: IngestionBlocker # Goobstation

