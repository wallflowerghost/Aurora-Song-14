#region SLE

- type: entity
  parent: ClothingBackpackMessengerContractor
  id: ASClothingBackpackMessengerSLENavy
  name: SLE messenger bag
  description: A versatile messenger bag used by Sector Law Enforcement personnel.
  components:
  - type: Sprite
    sprite: _NF/Clothing/Back/Messenger/color.rsi
    layers:
    - state: icon-base
      color: "#2a4a7c"  # SLE dark blue
    - state: icon-base-top
      color: "#7a9cc6"  # SLE light blue
    - state: icon-sling
      color: "#E9823C"  # SLE orange accent
    - state: icon-clasp
      color: "#e1af4e"  # Gold clasp
  - type: Clothing
    sprite: _NF/Clothing/Back/Messenger/color.rsi
    clothingVisuals:
      back:
      - state: base-equipped-BACKPACK
        color: "#2a4a7c"  # SLE dark blue
      - state: base-top-equipped-BACKPACK
        color: "#7a9cc6"  # SLE light blue
      - state: sling-equipped-BACKPACK
        color: "#E9823C"  # SLE orange accent
      - state: clasp-equipped-BACKPACK
        color: "#e1af4e"  # Gold clasp
  - type: Item
    inhandVisuals:
      left:
      - state: base-inhand-left
        color: "#2a4a7c"  # SLE dark blue
      - state: base-top-inhand-left
        color: "#7a9cc6"  # SLE light blue
      - state: clasp-inhand-left
        color: "#e1af4e"  # Gold clasp
      right:
      - state: base-inhand-right
        color: "#2a4a7c"  # SLE dark blue
      - state: base-top-inhand-right
        color: "#7a9cc6"  # SLE light blue
      - state: clasp-inhand-right
        color: "#e1af4e"  # Gold clasp

