#region Mercenary
#Aurora - Moved from NF namespace to AS, as it is so substantially changed it is effectively a new item
- type: entity
  parent: [ClothingOuterHardsuitBaseNF, BaseC2Contraband]
  id: ClothingOuterHardsuitMercenary # Aurora: stats were of luxury mining hardsuit, adjusted to be more effective as a rare find or mid-game tool, with even a late-game usage-case. Available from mercennary vendors, and as rare loot.
  name: mercenary hardsuit
  description: An armored vacuum suit favored by mercenaries.
  components:
  - type: Sprite
    sprite: _AS/Clothing/OuterClothing/Hardsuits/mercenary.rsi
  - type: Clothing
    sprite: _AS/Clothing/OuterClothing/Hardsuits/mercenary.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.6 # Removed 10%
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.60
        Heat: 0.65
        Radiation: 0.6
        Caustic: 0.8
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitMercenary

- type: entity
  parent: ClothingOuterHardsuitMercenary
  id: ClothingOuterHardsuitPrivateSecurity # stats are of merc hardsuit, clone of mercenary hardsuit with different appearance, for aesthetics
  name: private security hardsuit
  description: An armored vacuum suit favored by private security contractors. Painted blue.
  components:
  - type: Sprite
    sprite: _AS/Clothing/OuterClothing/Hardsuits/private_security.rsi
  - type: Clothing
    sprite: _AS/Clothing/OuterClothing/Hardsuits/private_security.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING
      - state: equipped-OUTERCLOTHING-unshaded
        shader: unshaded
      outerClothing-vox:
      - state: equipped-OUTERCLOTHING-vox
      - state: equipped-OUTERCLOTHING-unshaded-vox
        shader: unshaded
      outerClothing-harpy:
      - state: equipped-OUTERCLOTHING-harpy
      - state: equipped-OUTERCLOTHING-unshaded-harpy
        shader: unshaded
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitPrivateSecurity

#region Medical

- type: entity
  parent: ClothingOuterHardsuitMercenary
  id: ClothingOuterHardsuitMedicArmored # stats are of merc hardsuit, but for Outpost medic use, with different appearance
  name: medic armored hardsuit
  description: An armored vacuum suit employed by outpost medics, for protection during S&R operations.
  components:
  - type: Sprite
    sprite: _AS/Clothing/OuterClothing/Hardsuits/medic_armored.rsi
  - type: Clothing
    sprite: _AS/Clothing/OuterClothing/Hardsuits/medic_armored.rsi
    clothingVisuals:
      outerClothing:
      - state: equipped-OUTERCLOTHING
      - state: equipped-OUTERCLOTHING-unshaded
        shader: unshaded
      outerClothing-vox:
      - state: equipped-OUTERCLOTHING-vox
      - state: equipped-OUTERCLOTHING-unshaded-vox
        shader: unshaded
      outerClothing-harpy:
      - state: equipped-OUTERCLOTHING-harpy
      - state: equipped-OUTERCLOTHING-unshaded-harpy
        shader: unshaded
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHelmetHardsuitMedicArmored
  - type: ItemToggle
    onUse: false
    soundActivate:
      path: /Audio/Items/flashlight_on.ogg
    soundDeactivate:
      path: /Audio/Items/flashlight_off.ogg
  - type: ItemToggleActiveSound
    activeSound:
      path: /Audio/Effects/Vehicle/ambulancesiren.ogg #not the best sound, but after looking through all of current freesound regarding sirens and ambulance, this was the best compromise
      params:
        volume: -4
  - type: UseDelay
    delay: 1.0
  - type: ToggleClothing
    action: ActionToggleParamedicSiren
  - type: ItemTogglePointLight
  - type: PointLight
    enabled: false
    radius: 2
    energy: 2
    color: blue
    mask: /Textures/Effects/LightMasks/double_cone.png
  - type: RotatingLight
    speed: 360

