#region SLE

- type: entity
  parent: [ ClothingOuterBaseLarge, BaseC2ContrabandUnredeemable ]
  id: ASClothingOuterArmorSLE
  name: SLE armor
  description: Standard issue tactical armor for Sector Law Enforcement personnel. Provides comprehensive protection.
  components:
  - type: Sprite
    sprite: _AS/Clothing/OuterClothing/Armor/sle_armor.rsi # Aurora Song - Using SLE-recolored sprites
  - type: Clothing
    sprite: _AS/Clothing/OuterClothing/Armor/sle_armor.rsi # Aurora Song - Using SLE-recolored sprites
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.65
        Heat: 0.7
        Caustic: 0.65
  - type: ClothingSpeedModifier
    walkModifier: 1.0
    sprintModifier: 1.0
  - type: ExplosionResistance
    damageCoefficient: 0.60
  - type: GroupExamine

