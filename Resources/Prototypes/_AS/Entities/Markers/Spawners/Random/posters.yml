#region tables
- type: entityTable
  id: TableRandomPosterContrabandBH
  table: !type:GroupSelector
    children:
    - id: ASPosterContrabandBHLogo

- type: entityTable
  id: TableRandomPosterContrabandIAC
  table: !type:GroupSelector
    children:
    - id: ASPosterContrabandIACLogo1
    - id: ASPosterContrabandIACLogo2
    - id: ASPosterContrabandIACLogo3
    - id: ASPosterContrabandIACLogo4
    - id: ASPosterContrabandIACLogo5
    - id: ASPosterContrabandIACLogo6
    - id: ASPosterContrabandIACLogo7
    - id: ASPosterContrabandIACLogo8
    - id: ASPosterContrabandIACLogo9

- type: entityTable
  id: TableRandomPosterContrabandCNS
  table: !type:GroupSelector
    children:
    - id: ASPosterContrabandCNSHorizon

- type: entityTable
  id: ASTableRandomPosterLegit
  table: !type:GroupSelector
    children:
    - id: ASPosterLegitAuroraSector

#regions spawners
- type: entity
  id: ASSpawnerRandomPosterAurora
  parent: MarkerBase
  name: random poster spawner
  suffix: Aurora only posters
  components:
  - type: Sprite
    layers:
    - state: red
    - sprite: Structures/Wallmounts/posters.rsi
      state: random_anything
    - sprite: Effects/crayondecals.rsi
      state: a
      offset: -0.2,0
    - sprite: Effects/crayondecals.rsi
      state: s
      offset: 0.2,0
  - type: EntityTableSpawner
    offset: 0
    deleteSpawnerAfterSpawn: true
    table: !type:GroupSelector
      children:
      - !type:NestedSelector
        tableId: TableRandomPosterContrabandBH
      - !type:NestedSelector
        tableId: TableRandomPosterContrabandIAC
      - !type:NestedSelector
        tableId: TableRandomPosterContrabandCNS
      - !type:NestedSelector
        tableId: ASTableRandomPosterLegit

- type: entity
  id: ASSpawnerRandomPosterBH
  parent: ASSpawnerRandomPosterAurora
  suffix: Aurora, BH
  components:
  - type: Sprite
