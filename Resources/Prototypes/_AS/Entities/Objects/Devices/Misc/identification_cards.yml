#region Special

- type: entity
  parent: UniversalIDCard
  id: ASUniversalIDCard
  name: universal ID card
  suffix: Admin
  description: An ID card that gives you access beyond your wildest dreams.
  components:
  - type: Sprite
    sprite: _AS/Objects/Misc/id_cards.rsi
    layers:
    - state: admin
    - state: idadmin
  - type: Clothing
    sprite: _AS/Objects/Misc/id_cards.rsi
  - type: Item
    heldPrefix: as_blue
  - type: IdCard
    jobTitle: job-title-universal
    jobIcon: JobIconAdmin
  - type: Access
    groups:
    - AllAccess
    - Silicon
    tags:
    - CentralCommand
    - ColonialCommand
    - NuclearOperative
    - SyndicateAgent
    - Wizard
    - Xenoborg
    - Pirate # Frontier
  - type: Tag #  Ignore Chameleon tags
    tags:
    - DoorBumpOpener
  - type: AgentIDCard
  - type: ActivatableUI
    key: enum.AgentIDCardUiKey.Key
    inHandsOnly: true
  - type: UserInterface
    interfaces:
      enum.AgentIDCardUiKey.Key:
        type: AgentIDCardBoundUserInterface

#region Autogenerating
- type: entity
  parent: ASIDCardStandard # Placeholder ID for an event ship to have a valid shuttledeed because NF code is strange.
  id: ASAutonomousIDCard
  name: certificate of autonomy #TODO: Figure out why this get renamed on init
  description: A certificate recongizing an automated vessel within corporate law.
  components:
  - type: Sprite
    layers:
    - state: autonomous
  - type: AutoGenerateDeed
    unique: true

- type: entity
  parent: ASSiteWorkerIDCard 
  id: ASDamascusIDCard
  name: damascus shuttle deed
  description: A spare ID Card for the site manager that contains the deed to Damascus Manufactory 
  components:
  - type: AutoGenerateDeed
    stationName: Damascus Manufactory
    unique: true

- type: entity
  parent: PassengerIDCard
  id: ASIDCardDeed
  name: autogenerating shuttle deed # placeholder so admins can find it, gets replaced at init
  components:
  - type: AutoGenerateDeed