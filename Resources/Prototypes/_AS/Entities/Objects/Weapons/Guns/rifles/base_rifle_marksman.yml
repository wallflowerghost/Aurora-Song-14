- type: entity
  id: ASBaseWeaponFrameRifleMarksmanAuroraGunsmith
  parent: [ NFBaseWeaponFrameRifleAssaultFrontierGunsmith ]
  abstract: true
  components:
  - type: Gun
    minAngle: 2
    maxAngle: 9
    angleIncrease: 1.5
    angleDecay: 5
    fireRate: 3.5 # fire rate tweak, increase | Aurora
  - type: NFWeaponDetails
    class: weapon-details-manufacturer-frontier-gunsmith-consortium

- type: entity
  id: ASBaseWeaponRifleMarksmanChamber30
  parent: NFBaseWeaponRifleAssaultChamber30
  abstract: true
  components:
  - type: Gun
    examineCaliber: gun-examine-caliber-30
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/rifle2.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ASMagazineMarksmanRifle30
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist: &mag30Whitelist
          tags:
            - ASMagazineMarksmanRifle30
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber: &chamber30Standard
        name: Chamber
        startingItem: NFCartridgeRifle30
        priority: 1
        whitelist: &chamber30Whitelist
          tags:
            - NFCartridgeRifle30

- type: entity
  id: ASBaseWeaponRifleMarksmanChamber30Overpressure
  parent: NFBaseWeaponRifleAssaultChamber30
  abstract: true
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: ASMagazineMarksmanRifle30Overpressure
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist: *mag30Whitelist
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber: &chamber30Rubber
        name: Chamber
        startingItem: NFCartridgeRifle30Overpressure
        priority: 1
        whitelist: *chamber30Whitelist
