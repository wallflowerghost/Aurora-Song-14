# Aurora's Song - Add back rifle mags, this file originally came from upstream
- type: entity
  id: BaseMagazineCaselessRifle
  name: "magazine (.25 caseless)"
  parent: [ BaseItem, BaseC3SyndicateContrabandNoValue, RecyclableItemSteelTiny ] # Frontier: BaseSecurityContraband<BaseC3SyndicateContraband, added RecyclableItemSteelTiny | Aurora's Song: BaseCartridge changed to BaseItem
  abstract: true
  components:
  - type: Tag
    tags:
    - MagazineCaselessRifle
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
      - NFCartridgeRifle25 # Aurora - this is the new cartridge prototype
    # proto: CartridgeCaselessRifle # Frontier
    capacity: 30
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: _AS/Objects/Weapons/Guns/Ammunition/Magazine/CaselessRifle/caseless_rifle_mag.rsi # Aurora's Song - Added back rifle mags
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  abstract: true
  parent: [ BaseItem, BaseC3SyndicateContrabandNoValue, RecyclableItemSteelTiny ] # Frontier: BaseSecurityContraband<BaseC3SyndicateContraband, added RecyclableItemSteelTiny | Aurora's Song: BaseCartridge changed to BaseItem
  id: BaseMagazinePistolCaselessRifle
  name: "pistol magazine (.25 caseless)"
  components:
  - type: Tag
    tags:
    - MagazinePistolCaselessRifle
  - type: BallisticAmmoProvider
    whitelist:
      tags:
      # - CartridgeCaselessRifle # Aurora's Song - disable old prototype
      - NFCartridgeRifle25 # Aurora - this is the new cartridge prototype
    # proto: CartridgeCaselessRifle # Frontier
    capacity: 10
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/CaselessRifle/caseless_pistol_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance

- type: entity
  categories: [ HideSpawnMenu ] # Frontier
  parent: BaseMagazinePistolCaselessRifle
  id: MagazinePistolCaselessRifle
  name: "pistol magazine (.25 caseless)"
  description: 10-round magazine for the Cobra pistol. Intended to hold general-purpose kinetic ammunition.
  components:
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe

- type: entity
  categories: [ HideSpawnMenu ] # Frontier
  parent: BaseMagazinePistolCaselessRifle
  id: MagazinePistolCaselessRiflePractice
  name: "pistol magazine (.25 caseless practice)"
  description: 10-round magazine for the Cobra pistol. Intended to hold harmless practice ammunition.
  components:
  - type: BallisticAmmoProvider
    # proto: CartridgeCaselessRiflePractice # Frontier
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#dbdbdb"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#dbdbdb"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#dbdbdb"

