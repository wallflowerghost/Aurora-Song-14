  - type: Gun
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/universal.ogg
  - type: Sprite
    sprite: _AS/Objects/Weapons/Guns/Pistols/universals.rsi
  - type: Clothing
