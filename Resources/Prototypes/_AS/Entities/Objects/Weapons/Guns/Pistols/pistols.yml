#region DeltaV

- type: entity
  id: ASWeaponPistolUniversal
  parent: [ NFBaseWeaponPistolChamber45, NFBaseWeaponFramePistolNanotrasen ] # Restored to .45 | Aurora
  name: mk32 "Universal"
  description: The Mark 32 Offensive Handgun.
  components: #MK32 restored as accessible .45 pistol, status and soudns adjusted | Aurora
  - type: Gun
    minAngle: 1
    maxAngle: 15
    angleIncrease: 3
    angleDecay: 3
    fireRate: 3
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/universal.ogg
  - type: Sprite
    sprite: _AS/Objects/Weapons/Guns/Pistols/universal.rsi
  - type: Clothing
    sprite: _AS/Objects/Weapons/Guns/Pistols/universal.rsi

- type: entity
