- type: entity
  parent: BasePlushieCat
  id: PlushieShana
  name: familiar white catwolf plushie
  description: Looks tired. Might bite you. Smells like vanilla.
  components:
  - type: Sprite
    sprite: _AS/Objects/Fun/customplushie.rsi
    state: shanamctavish
  - type: DatasetVocalizer
    dataset: PlushieShanaTalk
  - type: Vocalizer
    minVocalizeInterval: 12m
    maxVocalizeInterval: 14m
    hideChat: true
  - type: FoodSequenceElement
    entries:
      CottonBurger: PlushieCatWhite
  - type: Item
    inhandVisuals:
      left:
      - state: shana-inhand-left
      right:
      - state: shana-inhand-right





