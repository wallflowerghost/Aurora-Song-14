#region SLE
- type: entity
  name: Commissioner's rubber stamp
  parent: [RubberStampBase, BaseCommandContraband]
  id: ASRubberStampCommissioner
  categories: [ DoNotMap ]
  components:
  - type: Stamp
    stampedName: stamp-component-stamped-name-commissioner
    stampedColor: "#4a6fa5"
    stampState: "paper_stamp-as-commissioner"
    protected: True
  - type: Sprite
    sprite: _AS/Objects/Misc/stamps.rsi
    state: stamp-commissioner

