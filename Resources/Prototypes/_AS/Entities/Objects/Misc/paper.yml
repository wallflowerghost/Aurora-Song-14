- type: entity
  id: BoxFolderPalOrange
  parent: BoxFolderBase
  name: PAL folder
  suffix: Orange
  description: A folder to contain important SLE forms.
  components:
  - type: Sprite
    sprite: _NF/Objects/Misc/bureaucracy.rsi
    layers:
    - state: folder-pal-orange
    - state: folder-base
  - type: StorageFill
    contents:
      - id: Paper
        prob: 0.5
      - id: PaperOffice
        prob: 0.4
      - id: Paper
        prob: 0.3
      - id: PaperOffice
        prob: 0.2
      - id: Paper
        prob: 0.2

