#region SLE

- type: entity
  parent: [BaseStructureIndestructible, BaseStructureComputerTabletop, ComputerShipyardSLE]
  id: ComputerTabletopShipyardSLE
  components:
  - type: Sprite
    drawdepth: SmallObjects
    layers:
    - map: ["computerLayerBody"]
      sprite: _NF/Structures/Machines/computer_tabletop.rsi
      state: computer_tabletop
    - map: ["computerLayerKeyboard"]
      sprite: _NF/Structures/Machines/computer_tabletop.rsi
      state: generic_keyboard_tabletop
    - map: ["computerLayerScreen"]
      sprite: _NF/Structures/Machines/computers.rsi
      state: shipyard_sle
    - map: ["computerLayerKeys"]
      sprite: _NF/Structures/Machines/computers.rsi
      state: telesci_key

