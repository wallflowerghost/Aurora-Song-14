- type: emoteSounds
  id: FairySpeech
  params:
    variation: 0.125
  sounds:
    Scream:
      collection: FairyScreams
    Laugh:
      collection: FairyLaugh
    Sneeze:
      collection: FemaleSneezes
    Cough:
      collection: FemaleCoughs
    Yawn:
      collection: FairyYawn
    Snore:
      collection: Snores
    Sigh:
      collection: FairySigh
    Crying:
      collection: FairyCry
    Whistle:
      collection: Whistles
    Weh:
      collection: Weh
    Hew:
      collection: Hew
    Gasp:
      collection: FairyGasp
    DefaultDeathgasp:
      collection: FairyDeathgasp

- type: emoteSounds
  id: FairyBodyEmotes
  sounds:
    Clap: # block start | Fairies were missing certain emote sounds, added in entries
      collection: Claps
    ClapSingle:
      collection: ClapSingle
    Salute:
      collection: Salutes
    Snap:
      collection: Snaps
      params:
        volume: -7 # block end
    FairyGlimmer:
      collection: FairyGlimmer
    Flutter:
      collection: FairyFlutter
    Flap:
      collection: FairyFlutter
