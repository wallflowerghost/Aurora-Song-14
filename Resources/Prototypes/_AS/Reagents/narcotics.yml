- type: reagent
  id: FairyBlood
  name: reagent-name-fairy
  group: Narcotics
  desc: reagent-desc-fairy
  physicalDesc: reagent-physical-desc-sparkly
  flavor: magical
  color: "#D05183"
  metabolisms:
    Narcotic:
      metabolismRate : 0.5
      effects:
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.1
        sprintSpeedModifier: 1.1
