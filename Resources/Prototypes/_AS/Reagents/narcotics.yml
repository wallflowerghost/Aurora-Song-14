        effectProto: StatusEffectSeeingRainbow
        time: 16
        type: Add
      - !type:PopupMessage
        type: Local
        visualType: Medium
        messages:
          - "reagent-effect-fairy1"
          - "reagent-effect-fairy2"
          - "reagent-effect-fairy3"
          - "reagent-effect-fairy4"
          - "reagent-effect-fairy5"
          - "reagent-effect-fairy6"
          - "reagent-effect-fairy7"
          - "reagent-effect-fairy8"
        probability: 0.5
      - !type:PopupMessage
        type: Local
        visualType: Small
        messages:
          - "reagent-effect-fairy-fade"
        probability: 0.35
        conditions:
          - !type:ReagentCondition
            reagent: FairyBlood
            max: 0.5
      - !type:ModifyStatusEffect
        effectProto: StatusEffectWoozy
        time: 20.0
        conditions:
          - !type:ReagentCondition
            reagent: FairyBlood
            min: 13
      - !type:GenericStatusEffect
        key: Stutter
        component: ScrambledAccent
        conditions:
          - !type:ReagentCondition
            reagent: FairyBlood
            min: 13
      - !type:GenericStatusEffect
        key: TemporaryBlindness
        component: TemporaryBlindness
        conditions:
          - !type:ReagentCondition
            reagent: FairyBlood
            min: 13

- type: reagent
  id: ColdRage
  name: reagent-name-cold-rage
  group: Narcotics
  desc: reagent-desc-cold-rage
  physicalDesc: reagent-physical-desc-icy
  flavor: coldDeath
  color: "#47ffbf"
  metabolisms:
    Cryogenic:
        metabolismRate: 2.5 # Sheleg seem to specifically metabolise things slower, so to compensate it has to be declared higher
        # Secondary benefit of this is that it makes these "Sheleg drugs" less useful for non Sheleg, which is good for roleplay reasons
        # and also makes them less universally good than the other cryo chems, which is nice for balance reasons.
        effects:
        - !type:MovementSpeedModifier
            walkSpeedModifier: 1.5
            sprintSpeedModifier: 1.5
            conditions:
            - !type:TemperatureCondition
              max: 213.0
            - !type:MetabolizerTypeCondition # Aurora's Song - OrganType>MetabolizerTypeCondition
              type: [ Sheleg ]
        - !type:GenericStatusEffect
          key: Stun
          time: 3
          type: Remove
        - !type:GenericStatusEffect
          key: KnockedDown
          time: 3
          type: Remove
        - !type:GenericStatusEffect
          key: StaminaModifier
          component: StaminaModifier
          time: 3
          type: Add
        - !type:ModifyStatusEffect
          effectProto: StatusEffectForcedSleeping
          time: 3
          type: Remove
        - !type:PopupMessage
            type: Local
            visualType: Medium
            messages:
              - "reagent-effect-cold-rage1"
              - "reagent-effect-cold-rage2"
              - "reagent-effect-cold-rage3"
              - "reagent-effect-cold-rage4"
              - "reagent-effect-cold-rage5"
              - "reagent-effect-cold-rage6"
              - "reagent-effect-cold-rage7"
              - "reagent-effect-cold-rage8"
              - "reagent-effect-cold-rage9"
            probability: 0.5
        - !type:PopupMessage
          type: Local
          visualType: Small
          messages:
          - "reagent-effect-cold-rage-fade"
          probability: 0.35
          conditions:
          - !type:ReagentCondition
            reagent: ColdRage
            max: 0.5

