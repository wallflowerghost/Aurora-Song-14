# Metal Tiles
# Aurora's Song | added locale strings for every tile.
- type: entity
  parent: FloorTileItemBase
  id: FloorTileItemMetalBlue
  components:
  - type: Sprite
    sprite: /Textures/_AS/Objects/Tiles/N14Tiles.rsi # Aurora's Song - was state: steel, added scale and sprite
    scale: 0.5, 0.5 # Aurora's Song
    state: metalblue
  - type: Item
    heldPrefix: steel
  - type: FloorTile
    outputs:
      - Plating
      - FloorMetalBlue
  - type: Stack
    stackType: FloorTileMetalBlue

