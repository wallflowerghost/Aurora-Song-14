# Aurora's Song | replaced names and descriptions with locale strings
- type: entity
  id: N14CarpetSingleBase
  parent: BaseStructure
  abstract: true
  components:
  - type: Sprite
    drawdepth: FloorTiles
  - type: Physics
    canCollide: false
  - type: Fixtures
  - type: Damageable
    damageContainer: Inorganic
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 10
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]


- type: entity
  parent: N14CarpetSingleBase
  id: N14RugMat
  components:
  - type: Sprite
    sprite: _Nuclear14/Structures/Furniture/rugs.rsi
    state: mat_blank

- type: entity
  parent: N14RugMat
  id: N14RugMatWelcome
  suffix: welcome
  components:
  - type: Sprite
    state: mat_welcome

- type: entity
  parent: N14RugMat
  id: N14RugMatVulgar1
  suffix: get f
  description: A charming floor mat.
  components:
  - type: Sprite
    state: mat_vulgar

- type: entity
  parent: N14RugMatVulgar1
  id: N14RugMatVulgar2
  suffix: f off
  components:
  - type: Sprite
    state: mat_vulgar_2

- type: entity
  parent: N14RugMatVulgar1
  id: N14RugMatTown
  suffix: s town
  components:
  - type: Sprite
    state: mat_town

