# N14:TODO: make base doors for damage resists and destruction loot for wood, metal /+ secure, glass and cloth.
# Aurora's Song | replaced names and descriptions with locale strings
- type: entity
  id: N14BaseDoor # Metal Base
  parent: BaseStructure
  abstract: true
  components:
  - type: InteractionOutline
  - type: Sprite
    netsync: false
    noRot: true
    sprite: _Nuclear14/Structures/Doors/FalloutDoors/wooddoor.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: AnimationPlayer
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,0.49"
        density: 100
        mask:
        - FullTileMask
        layer:
        - AirlockLayer
  - type: Door
    bumpOpen: false
    clickOpen: true
    closeTimeOne: 0.2
    closeTimeTwo: 0.6
    openTimeOne: 0.6
    openTimeTwo: 0.2
    openSound:
      path: /Audio/Effects/door_open.ogg
    closeSound:
      path: /Audio/Effects/door_close.ogg
  - type: Appearance
  - type: Airtight
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Metallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 500
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          SheetSteel1:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Occluder
  - type: BlockWeather

# Wooden Doors
- type: entity
  parent: N14BaseDoor
  id: N14DoorMakeshift # Base Door Wood
  components:
  - type: Sprite
    sprite: _Nuclear14/Structures/Doors/FalloutDoors/wooddoor.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 250
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 1
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Construction
    graph: N14DoorGraph
    node: woodDoorMakeshift

- type: entity
  parent: N14DoorMakeshift
  id: N14DoorWoodHousePainted
  suffix: painted
  components:
  - type: Sprite
    netsync: false
    sprite: _Nuclear14/Structures/Doors/FalloutDoors/housedoorpainted.rsi
    layers:
    - state: closed
      map: ["enum.DoorVisualLayers.Base"]
    - state: paint
      map: [ "enum.DamageStateVisualLayers.Base" ]
  - type: RandomSprite
    available:
      - enum.DamageStateVisualLayers.Base:
          paint: Rainbow

