# Decor
- type: entity
  parent: N14SignBase
  id: N14WallDecorClock
  components:
  - type: Sprite
    sprite: _Nuclear14/Structures/Wallmounts/walldecor.rsi
    snapCardinals: false
    state: clock

- type: entity
  parent: N14WallDecorClock
  id: N14WallDecorCalendar
  components:
  - type: Sprite
    state: calendar

- type: entity
  parent: N14WallDecorClock
  id: N14WallDecorCalendar1
  components:
  - type: Sprite
    state: calendar_blank

- type: entity
  parent: N14WallDecorClock
  id: N14WallDecorCross
  components:
  - type: Sprite
    state: cross

- type: entity
  parent: N14WallDecorClock
  id: N14WallDecorWallscreen
  components:
  - type: Sprite
    state: wallscreen
