- type: entity
  parent: ClothingBeltStorageBase # If Epistemics needs their own belts, it should be a different item, really
  id: ClothingBeltMantis
  name: dated mantis belt # TheDen
  description: "A structured, layered sash designed to carry mantis equipment. All the company would pay for prior to the mantis equipment refresh, but it does have sheaths for certain weapons." # TheDen
  abstract: true # made abstract so it can be referenced without worrying about the missing sprites - Aurora Song
  components:
  - type: Storage # Aurora: Change storage to match other aurora belts
    maxItemSize: Normal
    defaultStorageOrientation: Vertical
    grid:
    - 0,0,7,1
    #whitelist: # Aurora: Remove belt whitelist
    #  tags:
    #    - Folder
    #    - Document
    #    - Write
    #    - HandLabeler
    #    - Flashlight
    #    - Syringe # TheDen
    #    - Bottle # TheDen
    #    - PillCanister # TheDen
    #    - Pill # TheDen
    #    - Flash # TheDen
    #    - ScienceTool # TheDen
    #    - MantisBeltStorable # TheDen - Only to be used for mantis-specific items
        # - ForensicBeltEquip # TheDen - The old name of the mantis belt's whitelist tag, now made more clear
        # - Sidearm # TheDen - Only tagged mantis weapons will fit inside
      # components: # TheDen - Doing it this way makes these items fit only if you click them onto the belt sprite itself...
        # - AnomalyScanner
        # - NodeScanner
        # - Flash
  - type: Appearance # TheDen - It has a sheath for MantisMeleeKnife or MantisMeleeCane (MantisMeleeFist is worn like a glove, and MantisMeleeGreatsword is intentionally excluded)
  - type: ContainerContainer # TheDen - The rest of this item is our code
    containers:
      storagebase: !type:Container
        ents: []
      mantisknife: !type:ContainerSlot {}
      mantissickle: !type:ContainerSlot {}
      mantiscane: !type:ContainerSlot {}
  - type: ItemSlots
    slots:
      mantisknife:
        name: clothing-belt-mantisknife
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - MantisKnife
        priority: 3
      mantissickle:
        name: clothing-belt-mantissickle
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - MantisSickle
        priority: 3
      mantiscane:
        name: clothing-belt-mantiscane
        insertVerbText: sheath-insert-verb
        ejectVerbText: sheath-eject-verb
        insertSound: /Audio/Items/sheath.ogg
        ejectSound: /Audio/Items/unsheath.ogg
        whitelist:
          tags:
          - MantisCane
        priority: 3
  - type: ItemMapper
    mapLayers:
      mantisknife:
        whitelist:
          tags:
          - MantisKnife
      mantissickle:
        whitelist:
          tags:
          - MantisSickle
      mantiscane:
        whitelist:
          tags:
          - MantisCane
    sprite: _DEN/Clothing/Belt/belt_overlay.rsi
  - type: Tag
    tags:
    - WhitelistChameleon # We really need chameleon belts...
 # - type: GuideHelp # Aurora: Remove guide
 #   guides: [ MantisGuide ]

- type: entity
  parent: [NFClothingBeltStorageBase, ContentsExplosionResistanceBase, ClothingSlotBase] # DeltaV - add parent ClothingSlotBase
  id: ClothingBeltMilitaryWebbingCMO
  name: chief medical officer's chest rig
  description: A medical chest rig with deep pockets, for use by paramedics and health professionals.
  components:
  - type: Sprite
    sprite: _DV/Clothing/Belt/cmowebbing.rsi # DeltaV - resprite
  - type: Clothing
    sprite: _DV/Clothing/Belt/cmowebbing.rsi # DeltaV - resprite
  - type: Item
    size: Large
  - type: ItemSlots # DeltaV - add medkit slot
    slots:
      medkit:
        name: clothing-belt-medkit
        whitelist:
          tags:
          - Medkit
        insertOnInteract: false # or you can't easily stow medkits in your rig.
# Aurora - Remove storage override
#  - type: Storage
#    maxItemSize: Normal
#    grid: # DeltaV - Make the grid smaller
#    - 0,0,2,1
#    - 4,0,7,1
  - type: ItemMapper # DeltaV - add stowed medkit sprite
    mapLayers:
      medkit:
        whitelist:
          tags:
          - Medkit
    sprite: _DV/Clothing/Belt/belt_overlay.rsi
  - type: Tag
    tags:
      - BeltSlotNotBelt
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
      medkit: !type:ContainerSlot {}
  - type: Appearance # DeltaV
