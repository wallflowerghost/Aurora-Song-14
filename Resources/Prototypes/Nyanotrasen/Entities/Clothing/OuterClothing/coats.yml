- type: entity
  parent: ClothingOuterStorageBase # Contraband because it's lightly armored
  id: ClothingOuterCoatMantis
  name: dated mantis jacket
  description: "Modeled after an ancient infantry uniform, this jacket may guard you against the unknown in your journey for the truth. All the company would pay for prior to the mantis equipment refresh." # TheDen
  abstract: true # made abstract so it can be referenced without worrying about the missing sprites - Aurora Song
  components:
  - type: Appearance
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.8
        Heat: 0.8
        Cold: 0.8 # TheDen
  #- type: StaminaDamageResistance # TheDen - Standard for all armor now
  #  coefficient: 0.8
  - type: TemperatureProtection
    heatingCoefficient: 0.3
    coolingCoefficient: 0.3
  - type: Tag # TheDen
    tags:
    - WhitelistChameleon
    - MantisBeltStorable
