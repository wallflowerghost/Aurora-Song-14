# Weapons
- type: entity
  parent: MarkerBase
  id: SpawnPointHeadOfSecurityWeapon
  name: head of security weapon spawner
  components:
  - type: EntityTableSpawner
    offset: 0.2
    table: !type:AllSelector
      children:
      - id: NFWeaponSubMachineGunWt550 # Aurora's Song - WeaponSubMachineGunWt550>NFWeaponSubMachineGunWt550
      - id: NFMagazineSubMachineGunTopMounted35 # Aurora's Song - MagazinePistolSubMachineGunTopMounted>NFMagazineSubMachineGunTopMounted35
      - id: NFMagazineSubMachineGunTopMounted35 # Aurora's Song - MagazinePistolSubMachineGunTopMounted>NFMagazineSubMachineGunTopMounted35
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Objects/Weapons/Guns/SMGs/wt550.rsi
      state: icon

- type: entity
  parent: MarkerBase
  id: SpawnPointWardenWeapon
  name: warden weapon spawner
  components:
  - type: EntityTableSpawner
    offset: 0.2
    table: !type:AllSelector
      children:
      - id: NFWeaponShotgunEnforcer # Aurora's Song - Replaced WeaponEnergyShotgun with NFWeaponShotgunEnforcer arbitrarily to prevent test fail
  - type: Sprite
    sprite: Markers/jobs.rsi
    layers:
    - state: green
    - sprite: Objects/Weapons/Guns/Battery/energy_shotgun.rsi
      state: icon
