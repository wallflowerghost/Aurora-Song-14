  parent: [ BaseTowel, BaseC3ContrabandNoValue ] # Frontier: BaseSyndicateContraband<BaseC3ContrabandNoValue
  components:
  - type: Sprite
    noRot: true
    layers:
    - state: icon
      color: "#535353"
      map: ["foldedLayer"]
    - state: iconstripe
      color: "#940000"
      map: ["foldedStripe"]
    - state: icon-unfolded
      color: "#535353"
      map: ["unfoldedLayer"]
      visible: false
    - state: stripe-unfolded
      color: "#940000"
      map: ["unfoldedStripe"]
      visible: false
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#535353"
      right:
      - state: inhand-right
        color: "#535353"
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: "#535353"
      jumpsuit:
      - state: equipped-INNERCLOTHING
        color: "#535353"
      belt:
      - state: equipped-BELT
        color: "#535353"
  - type: Fiber
    fiberColor: fibers-black
