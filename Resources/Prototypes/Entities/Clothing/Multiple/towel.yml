# Aurora's Song - Added noRot, Foldable, Strap, layers for folded and unfolded states, visualizer settings for layers (foldedLayer, unfoldedLayer, foldedStripe, unfoldedStripe, foldedLogo, unfoldedLogo), and corresponding settings for each towel color/ design.

- type: entity
  id: BaseTowel
  name: base towel
  abstract: true
  description: If you want to survive out here, you gotta know where your towel is.
  parent: [ BaseDeployFoldable, UnsensoredClothingUniformBase, ClothingHeadBase, ClothingBeltBase ] # Aurora's Song - added BaseDeployFoldable
  components:
  - type: Sprite
    sprite: Clothing/Multiple/towel.rsi
    # Aurora's Song - changes start: added noRot, Foldable, Strapand visual layers
    noRot: true
    layers:
    - state: icon
      map: ["foldedLayer"]
    - state: icon-unfolded
      map: ["unfoldedLayer"]
      visible: false
  - type: Foldable
    folded: true
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.FoldedVisuals.State:
        foldedLayer:
          True: {visible: true}
          False: {visible: false}
        unfoldedLayer:
          True: {visible: false}
          False: {visible: true}
        foldedStripe:
          True: {visible: true}
          False: {visible: false}
        unfoldedStripe:
          True: {visible: false}
          False: {visible: true}
        foldedLogo:
          True: {visible: true}
          False: {visible: false}
        unfoldedLogo:
          True: {visible: false}
          False: {visible: true}
  - type: Strap
    enabled: false
    position: Down
    rotation: -90
    buckleOffset: "0,-0.15"
    # Aurora's Song - changes end
  - type: Clothing
    sprite: Clothing/Multiple/towel.rsi
    slots:
    - BELT
    - INNERCLOTHING
    - HEAD
    femaleMask: UniformTop
    equipSound:
    unequipSound:
  - type: Spillable
    solution: absorbed
    spillWhenThrown: false
  - type: Absorbent
    pickupAmount: 15
  - type: SolutionContainerManager
    solutions:
      food:
        maxVol: 30
        reagents:
        - ReagentId: Fiber
          Quantity: 30
      absorbed:
        maxVol: 30
  - type: UseDelay
    delay: 1
  - type: Fiber
    fiberColor: fibers-white
  - type: DnaSubstanceTrace
  - type: Item
    size: Small

- type: entity # Aurora's Song - added towel unfolded state
  id: TowelColorWhite
  name: white towel
  parent: BaseTowel
  components:
  - type: Sprite
    noRot: true
    layers:
    - state: icon
      color: "#EAE8E8"
      map: ["foldedLayer"]
    - state: icon-unfolded
      color: "#EAE8E8"
      map: ["unfoldedLayer"]
      visible: false
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#EAE8E8"
      right:
      - state: inhand-right
        color: "#EAE8E8"
  - type: Clothing
    clothingVisuals:
      head:
      - state: equipped-HELMET
        color: "#EAE8E8"
      jumpsuit:
      - state: equipped-INNERCLOTHING
        color: "#EAE8E8"
      belt:
      - state: equipped-BELT
        color: "#EAE8E8"
  - type: Fiber
    fiberColor: fibers-white
