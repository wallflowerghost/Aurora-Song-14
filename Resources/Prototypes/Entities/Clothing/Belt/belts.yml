## Webbing

# Weirdly the only webbing with a storage whitelist and item mapper.
# Might be worth making less common (armory only?) and removing the whitelist to eliminate the inconsistency.
- type: entity
  parent: [NFClothingBeltStorageHolsterBase] # Frontier: ClothingBeltStorageBase<NFClothingBeltStorageBase # DeltaV - add parent ClothingSlotBase
  id: ClothingBeltSecurityWebbing
  name: security carrier
  description: Unique and versatile chest rig, can hold security gear.
  components:
  - type: Sprite
    sprite: _DV/Clothing/Belt/securitywebbing.rsi # DeltaV - resprite
  - type: Clothing
    sprite: _DV/Clothing/Belt/securitywebbing.rsi # DeltaV - resprite

- type: entity
  parent: [ASClothingRigStorageHolsterBase] # Frontier and Aurora's Song: ClothingBeltStorageBase<ASClothingRigStorageHolsterBase, remove BaseSecurityCargoContraband
  id: ClothingBeltMercenaryWebbing # Frontier: Merc to Mercenary
  name: mercenary webbing
  description: Ideal for storing everything from ammo to weapons and combat essentials.
  components:
  - type: Sprite
    sprite: Clothing/Belt/mercwebbing.rsi
  - type: Clothing
    sprite: Clothing/Belt/mercwebbing.rsi
  - type: StaticPrice
    price: 500
    vendPrice: 500 # Aurora's Song - vend price set statically to avoid multipliers

- type: entity
  parent: [NFClothingBeltStorageHolsterBase] # Frontier: ClothingBeltStorageBase<NFClothingBeltStorageBase
  id: ClothingBeltSalvageWebbing
  name: salvage rig
  description: Universal unloading system for work in space.
  components:
  - type: Sprite
    sprite: Clothing/Belt/salvagewebbing.rsi
  - type: Clothing
    sprite: Clothing/Belt/salvagewebbing.rsi

- type: entity
  parent: [ASClothingRigStorageHolsterBase, ContentsExplosionResistanceBase, BaseC1Contraband] # Frontier and Aurora's Song: ClothingBeltStorageBase<ASClothingRigStorageHolsterBase, BaseSyndicateContraband<BaseC1Contraband
  id: ClothingBeltMilitaryWebbing
  name: chest rig
  description: A set of tactical webbing worn by boarding parties. # Frontier
  components:
  - type: Sprite
    sprite: Clothing/Belt/militarywebbing.rsi
  - type: Clothing
    sprite: Clothing/Belt/militarywebbing.rsi
  - type: ExplosionResistance
    damageCoefficient: 0.1
  - type: StaticPrice
    price: 500
    vendPrice: 500 # Aurora's Song - vend price set statically to avoid multipliers

- type: entity
  parent: ClothingBeltMilitaryWebbing
  id: ClothingBeltMilitaryWebbingMed
  name: medical chest rig
  description: A set of tactical webbing worn by medic operatives. # Frontier
  components:
  - type: Sprite
    sprite: Clothing/Belt/militarywebbingmed.rsi
  - type: Clothing
    sprite: Clothing/Belt/militarywebbingmed.rsi
  - type: ItemSlots # couldn't inherit from ASClothingSRigStorageHolsterMedkitBase due to already inheritiny from ASClothingRigStorageHolsterBase through military webbing, so added the medkit slot here
    slots:
      holster:
        name: clothing-belt-sidearm
        priority: 4 # higher number is higher priority
        whitelist:
          tags:
          - Sidearm
          - Knife # add knife to whitelist
        ejectSound: #Aurora's Song - add unique holster sounds; originally made for Den
          path: /Audio/_DEN/Weapons/pistol_unholster.ogg
        insertOnInteract: true
        insertSound: #Aurora's Song - add unique holster sounds; originally made for Den
          path: /Audio/_DEN/Weapons/pistol_holster.ogg
      medkit:
        name: clothing-belt-medkit
        priority: 3
        whitelist:
          tags:
          - Medkit
        insertOnInteract: true
  - type: Appearance
  - type: ItemMapper # add stowed medkit sprite
    mapLayers:
      baton_rig:
        whitelist:
          components:
          - Stunbaton
      gasgrenade:
        whitelist:
          tags:
          - Grenade
      slp_rig:
        whitelist:
          tags:
          - Sidearm
      knife_rig: # add knife sprite mapping
        whitelist:
          tags:
          - Knife
      medkit_rig:
        whitelist:
          tags:
          - Medkit
    sprite: _DV/Clothing/Belt/belt_overlay.rsi
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: [ ]
      holster: !type:ContainerSlot { }
      medkit: !type:ContainerSlot { }

- type: entity
  parent: ClothingBeltMilitaryWebbing
  id: ClothingBeltMilitaryWebbingERT
  name: ERT chest rig
  description: A set of tactical webbing worn by Emergency Response Team operatives.
  components:
  - type: Sprite
    sprite: Clothing/Belt/militarywebbingert.rsi
  - type: Clothing
    sprite: Clothing/Belt/militarywebbingert.rsi
