# region FRONTIER - IGNORED

# Rockets

- type: entity
  parent: [BaseItem] # Frontier: removed BaseMajorContraband
  id: CartridgeRocket
  name: PG-7VL grenade
  description: A 1.5 warhead designed for the RPG-7 launcher. Has tubular shape.
  components:
  - type: Tag
    tags:
      - CartridgeRocket
  - type: Item
    size: Small
  - type: CartridgeAmmo
    proto: BulletRocket # Frontier
    deleteOnSpawn: true
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    state: rpg
  - type: StaticPrice
    price: 20

- type: entity
  parent: [BaseItem] # Frontier: removed BaseMajorContraband
  id: CartridgeRocketSlow
  name: PG-7VL grenade "Snail-Rocket"
  description: A 1.5 warhead designed for the RPG-7 launcher. It's unusually slow.
  components:
    - type: Tag
      tags:
        - CartridgeRocket
    - type: Item
      size: Small
    - type: CartridgeAmmo
      proto: BulletWeakRocket # Frontier
      deleteOnSpawn: true
    - type: Sprite
      sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
      state: frag
    - type: StaticPrice
      price: 20

# Grenades

- type: entity
  abstract: true
  parent: [BaseItem, BaseC2ContrabandUnredeemable] # Frontier: BaseMajorContraband<BaseC2ContrabandUnredeemable
  id: BaseGrenade
  name: base grenade
  components:
  - type: Tag
    tags:
    - Grenade
  - type: Item
    size: Small
  - type: Sprite

- type: entity
  parent: BaseGrenade
  id: GrenadeBaton
  name: baton grenade
  components:
  - type: CartridgeAmmo
    proto: BulletGrenadeBaton # Frontier
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    layers:
    - state: baton
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: baton
    suffix: false

- type: entity
  parent: BaseGrenade
  id: GrenadeBlast
  name: blast grenade
  components:
