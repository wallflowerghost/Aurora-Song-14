      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: blast
    suffix: false

- type: entity
  parent: BaseGrenade
  id: GrenadeFlash
  name: flash grenade
  components:
