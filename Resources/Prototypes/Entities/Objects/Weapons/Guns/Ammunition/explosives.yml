    suffix: false

- type: entity
  parent: BaseGrenade
  id: GrenadeFrag
  name: frag grenade
  components:
  - type: CartridgeAmmo
    proto: BulletGrenadeFrag # Frontier
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    layers:
    - state: frag
      map: ["enum.AmmoVisualLayers.Base"]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: frag
    suffix: false

- type: entity
  parent: BaseGrenade
  id: GrenadeCleanade
  name: cleanade grenade round
  components:
  - type: CartridgeAmmo
    proto: BulletGrenadeCleanade # Frontier
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Explosives/explosives.rsi
    layers:
    - state: cleanade
      map: [ "enum.AmmoVisualLayers.Base" ]
  - type: Appearance
  - type: SpentAmmoVisuals
    state: frag
    suffix: false

- type: entity
  parent: BaseGrenade
  id: GrenadeEMP
  name: EMP grenade
  components:
