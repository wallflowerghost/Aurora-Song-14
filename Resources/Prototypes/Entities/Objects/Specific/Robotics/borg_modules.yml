    state: generic_materials

- type: entity
  id: BorgModuleConstruction
  parent: [ BaseBorgModuleEngineering, BaseProviderBorgModule ]
  name: construction cyborg module
  components:
  - type: Sprite
    layers:
    - state: engineering
    - state: icon-construction
  - type: ItemBorgModule # Aurora's Song - Made it like Frontier's DroppableBorgModule but left the upstream tiles in
    hands:
    - hand: # Aurora's Song - Make it like NF
        emptyRepresentative: ConstructionBag
        # emptyLabel: borg-slot-construction-empty
        whitelist:
          components:
          - NFConstructionBag
    - hand: # Aurora's Song - Make it like NF
        emptyRepresentative: SheetSteel
        emptyLabel: borg-placeholder-display-name-construction-material
        whitelist:
          tags:
          - Ingot
          - RodMetal1
          - Sheet
          components:
          - ConstructionMaterials
    - hand: # Aurora's Song - Make it like NF
        emptyRepresentative: BorgModuleConstructionMaterialPlaceholder
        emptyLabel: borg-placeholder-display-name-construction-material
        whitelist:
          tags:
          - Ingot
          - RodMetal1
          - Sheet
          - ConstructionMaterial
          components:
          - ConstructionMaterials
    - hand: # Aurora's Song - Make it like NF
        emptyRepresentative: ThrusterFlatpack
        emptyLabel: borg-placeholder-display-name-flatpack
        whitelist:
          components:
          - Flatpack
    - hand: # Aurora's Song - Make it like NF
        emptyRepresentative: CapacitorStockPart
        emptyLabel: borg-placeholder-display-name-construction-material
        whitelist:
          components:
          - Electronics
          - MachineBoard
          - ComputerBoard
          - Circuitboard
        blacklist:
          components:
          - SiliconLawProvider
    - hand:
        emptyRepresentative: FloorTileItemSteel
        emptyLabel: borg-slot-tiles-empty
        whitelist:
          components:
          - FloorTile
    - hand:
        emptyRepresentative: FloorTileItemWhite
        emptyLabel: borg-slot-tiles-empty
        whitelist:
          components:
          - FloorTile
    - hand:
        emptyRepresentative: FloorTileItemDark
        emptyLabel: borg-slot-tiles-empty
        whitelist:
          components:
          - FloorTile
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: construction-module }

