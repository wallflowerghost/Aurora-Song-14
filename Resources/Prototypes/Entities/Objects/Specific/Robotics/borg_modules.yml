# cargo modules
- type: entity
  id: BorgModuleAppraisal
  parent: [ BaseBorgModuleCargo, BaseProviderBorgModule ]
  name: cargo cyborg module # Frontier: appraisal<cargo
  components:
  - type: Sprite
    layers:
    - state: cargo
    - state: icon-appraisal
  - type: ItemBorgModule
    hands:
    - item: AppraisalTool
    # - item: Pen # Frontier
    # - item: HandLabeler # Frontier
    # - item: RubberStampApproved # Frontier
    # - item: RubberStampDenied # Frontier
    # - item: RadioHandheld # Frontier
    - hand: # Aurora's Song - Port Frontier module
        emptyRepresentative: CrateTradeSecureNormal
        emptyLabel: borg-placeholder-display-name-trading-crate
        whitelist:
          components:
            - TradeCrate
    - hand: # Aurora's Song - Port Frontier module
        emptyRepresentative: CrateTradeSecureNormal
        emptyLabel: borg-placeholder-display-name-trading-crate
        whitelist:
          components:
            - TradeCrate
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: appraisal-module }

- type: entity
