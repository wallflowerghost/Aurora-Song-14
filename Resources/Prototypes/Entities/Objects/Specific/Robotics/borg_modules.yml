# generic modules
- type: entity
  id: BorgModuleCable
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: cable cyborg module
  description: A universal cyborg module which allows the unit to install and manipulate electrical systems.
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-cables
  - type: ItemBorgModule
    hands:
    - item: CableApcStack10
      hand:
        emptyRepresentative: CableApcStack10
        emptyLabel: borg-slot-cables-empty
        whitelist:
          tags:
          - CableCoil
    - item: CableMVStack10
      hand:
        emptyRepresentative: CableMVStack10
        emptyLabel: borg-slot-cables-empty
        whitelist:
          tags:
          - CableCoil
    - item: CableHVStack10
      hand:
        emptyRepresentative: CableHVStack10
        emptyLabel: borg-slot-cables-empty
        whitelist:
          tags:
          - CableCoil
    - item: Wirecutter
    - item: Crowbar
    - item: trayScanner
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: wire-module }

- type: entity
  id: BorgModuleArtistry
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: artistry cyborg module
  description: A module for arts & crafts whilst the station burns!
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-artistry
  - type: ItemBorgModule
    hands:
    - item: SprayPainterBorg
    - item: CrayonBorg
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: artistry-module }

- type: entity
  id: BorgModuleFireExtinguisher
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: fire extinguisher cyborg module # Frontier: thruster<fire extinguisher
  # description: NT assigned a team to design a jetpack for cyborg units, but they ran out of funding and just made a bigger fire extinguisher. It comes with a integrated GPS and mass scanner though! # Frontier
  description: A module to help extinguish fires.
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-fire-extinguisher
  - type: ItemBorgModule
    hands:
    - item: BorgFireExtinguisher
    # - item: BorgHandheldGPSBasic # Frontier
    # - item: HandheldStationMapUnpowered # Frontier
    # - item: HandHeldMassScannerBorg # Frontier: todo - metal foam grenade? fire axe?
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: extinguisher-module }

- type: entity
  id: BorgModuleTool
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: tool cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-tools
  - type: ItemBorgModule
    hands:
    - item: Crowbar
    - item: Wrench
    - item: Screwdriver
    - item: Wirecutter
    - item: WelderIndustrial
    - item: Multitool
    - item: MaintenanceJack # Frontier
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: tool-module }

- type: entity
  id: BorgModuleInflatable
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: inflatable cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-inflatable
  - type: ItemBorgModule
    hands:
    - item: InflatableDoorStack
      hand:
        emptyRepresentative: InflatableDoorStack
