- type: entity
  parent: [BaseItem, BaseCommandContraband] # Frontier: Added BaseCommandContraband
  id: AccessConfigurator
  name: access configurator
  description: Used to modify the access level requirements for airlocks and other lockable devices.
  components:
    - type: EmitSoundOnLand
      sound:
        path: /Audio/Items/multitool_drop.ogg
    - type: Sprite
      sprite: Objects/Tools/access_configurator.rsi
      state: icon
    - type: Item
      size: Small
    - type: Clothing
      sprite: Objects/Tools/access_configurator.rsi
      quickEquip: false
      slots:
        - Belt
    - type: AccessOverrider
      accessLevels:
      - Armory
      # - Atmospherics # Frontier
      # - Bar # Frontier
      - Lieutenant # Aurora's Song - Changed from Bailiff to Lieutenant
      - Brig
#      - Brigmedic # Frontier | Aurora's Song - Converted to Corpsman
      - Captain
      # - Cargo # Frontier
      # - Chapel # Frontier
      # - Chemistry # Frontier
      - Command
      - Corpsman # Aurora's Song - Added Corpsman access
      - ChiefMedicalOfficer # Aurora's Song: Readded, moved w.r.t DoC
      - Detective # Frontier - moved down
      - Engineering
      - External
      - Aurora # Frontier - Aurora Song - Changed from Frontier to Aurora
      # - Hydroponics # Frontier
      - Janitor
      # - Kitchen # Frontier
      # - Lawyer # Frontier
      - Mail # Frontier
      - Maintenance
      - Medical
      - Mercenary # Frontier
      - ChiefEngineer # Frontier: reordered for "Plant Manager"
      - Prisoner # Aurora Song
      # - Quartermaster # Frontier
      # - Research # Frontier
      # - ResearchDirector # Frontier
      # - Salvage # Frontier
      - Security
      - Sergeant # Frontier
      - Service
      - HeadOfSecurity # Frontier: reordered for "Sheriff"
      - HeadOfPersonnel # Frontier: reordered for "Station Representative"
      - StationTrafficController # Frontier
      # - Theatre # Frontier
      - GenpopEnter
      - GenpopLeave
      privilegedIdSlot:
        name: id-card-console-privileged-id
        ejectSound: /Audio/Machines/id_swipe.ogg
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectOnBreak: true
        swap: false
        whitelist:
          components:
          - IdCard
      denialSound:
        path: /Audio/Machines/custom_deny.ogg
      doAfter: 0.5
    - type: UserInterface
      interfaces:
        enum.AccessOverriderUiKey.Key:
          type: AccessOverriderBoundUserInterface
    - type: ActivatableUI
      key: enum.AccessOverriderUiKey.Key
      requiresComplex: true
      requireActiveHand: false
      singleUser: true
      inHandsOnly: true
    - type: ItemSlots
    - type: ContainerContainer
      containers:
        AccessOverrider-privilegedId: !type:ContainerSlot

- type: entity
  parent: AccessConfigurator
  id: AccessConfiguratorUniversal
  name: universal access configurator
  suffix: Admin
  description: A modified access configurator used only by the mythical Administrator.
  components:
  - type: Sprite
    sprite: Objects/Tools/universal_access_configurator.rsi
  - type: Clothing
    sprite: Objects/Tools/universal_access_configurator.rsi
  - type: AccessOverrider
    accessLevels:
    - Armory
    - StationAi # Frontier: reordered for "Artificial Intelligence"
    - Atmospherics
    - Bar
    - Brig
#    - Brigmedic # Frontier | Aurora's Song - Converted to Corpsman
    - Captain
    - Cargo
    - Chapel
    - Chemistry
    - ChiefMedicalOfficer
    - Command
    - Corpsman # Aurora's Song - Added Corpsman access
    - Cryogenics
    - Borg # Frontier: reordered for "Cyborg"
    - Detective # Frontier: moved down
    - EmergencyShuttleRepealAll
    - Engineering
    - External
    - Aurora # Frontier - Aurora Song - Changed from Frontier to Aurora
    - Hydroponics
    - Janitor
    - Kitchen
    - Lawyer
    - Mail # Frontier
    - Maintenance
    - Medical
    - Mercenary # Frontier
    - ChiefEngineer # Frontier: reordered for "Plant Manager"
    - Pirate # Frontier
    - Prisoner # Aurora Song
    - Quartermaster
    - Research
    - ResearchDirector
    - BasicSilicon # Frontier: reordered for "Robot"
    - Salvage
    - Security
    - Service
    - HeadOfSecurity # Frontier: reordered for "Sheriff"
    - HeadOfPersonnel # Frontier: reordered for "Station Representative"
    - StationTrafficController # Frontier
    - Theatre
    - CentralCommand
    - ColonialCommand # Aurora's Song - Added Colonial Command access
    - NuclearOperative
    - SyndicateAgent
    - Wizard
    - Xenoborg
    - GenpopEnter
    - GenpopLeave
    privilegedIdSlot:
      name: id-card-console-privileged-id
      startingItem: ASUniversalIDCard # Aurora's Song - switched to ASUniversalIDCard
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
      ejectOnBreak: true
      swap: false
      whitelist:
        components:
        - IdCard
    denialSound:
      path: /Audio/Machines/custom_deny.ogg
    doAfter: 0.5
