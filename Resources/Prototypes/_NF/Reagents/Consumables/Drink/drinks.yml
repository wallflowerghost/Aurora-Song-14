- type: reagent
  id: TheMadgob
  name: reagent-name-the-madgob
  parent: BaseDrink
  desc: reagent-desc-the-madgob
  physicalDesc: reagent-physical-desc-thick
  flavor: creative
  color: "#81b42f"
  metabolisms:
    Digestion: # Aurora's Song - Drink>Digestion
      metabolites:
        PumpkinFlesh: 1
      effects:
      - !type:SatiateThirst
        factor: 2
      - !type:HealthChange
        damage:
          types: # Aurora's Song - Convert groups to types
            Poison: -0.5
            Radiation: -0.5
            Blunt: -0.33
            Slash: -0.33
            Piercing: -0.33
            Heat: -0.25
            Cold: -0.25
            Shock: -0.25
            Caustic: -0.25
            Asphyxiation: -0.5
            Bloodloss: -0.5
      - !type:Emote
          emote: Belch
          showInChat: true
          force: true
          probability: 0.25
  metamorphicSprite:
    sprite: _NF/Objects/Consumable/Drinks/themadgob.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 3
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false

