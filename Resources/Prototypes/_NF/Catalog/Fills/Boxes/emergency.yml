- type: entity
  parent: BoxSurvival
  id: NFBoxSurvival
  suffix: Oxygen
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: EmergencyOxygenTankFilled
        - id: SpaceMedipen
        - id: EmergencyMedipen
        - id: FoodPSB
        - id: DrinkWaterBottleFull
        - id: Flare
  - type: Sprite
    layers:
      - state: internals
      - state: emergencytank

