# Engineering
- type: entity
  parent: CrateEngineering
  id: CrateEngineeringKitRtg
  name: RTG toolkit
  description: Contains a full kit to build an RTG power plant.
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      entity_storage: !type:GroupSelector
        children:
      # Expected value: 2.8
        - id: GeneratorRTGFlatpack
          amount: 2
          prob: 0.4
        - id: GeneratorRTGFlatpack
          amount: 3
          prob: 0.4
        - id: GeneratorRTGFlatpack
          amount: 4
          prob: 0.2

