- type: entity
  id: CrateFloorsFun
  parent: CrateGenericSteel
  name: fun floors tiles crate
  description: A crate full of 30 random tiles, used for decoration.
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      entity_storage: !type:GroupSelector
        children:
        - id: FloorTileItemArcadeBlue
          amount: 30
          prob: 1
        - id: FloorTileItemArcadeBlue2
          amount: 30
          prob: 1
        - id: FloorTileItemArcadeRed
          amount: 30
          prob: 1
        - id: FloorTileItemEighties
          amount: 30
          prob: 1
        - id: FloorTileItemCarpetClown
          amount: 30
          prob: 1

