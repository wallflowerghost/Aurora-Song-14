- type: entity
  parent: ClothingBackpackDuffelSyndicateBundle
  id: ClothingBackpackDuffelSyndicateFilledEmpGrenadeLauncher
  name: China-Lake EMP bundle
  description: "An old China-Lake grenade launcher bundled with 8 rounds of EMP."
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: NFWeaponLauncherChinaLakeEmp
        - id: NFGrenadeEMP
          amount: 8

- type: entity
  parent: ClothingBackpackDuffelMime
  id: ClothingBackpackDuffelSurgeryImpovFilled
  name: improvised surgical duffel bag
  description: "This looks like set of improvised surgical tools put together by someone."
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ScalpelShiv
        - id: WelderMini
        - id: SawImprov
        - id: ClothingHandsGlovesFingerless
