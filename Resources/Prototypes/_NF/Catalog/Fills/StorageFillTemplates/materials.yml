# Aurora's Song - Convert Basic Materials to `entityTable`s

# Basic Materials
- type: entityTable # Full stacks
  id: StorageFillMaterialsBasic
  table: !type:AllSelector
    children:
    - id: SheetSteel
    - id: SheetGlass
    - id: SheetPlastic
    - id: MaterialWoodPlank
    - id: MaterialCloth

- type: entityTable # Stacks of 10
  id: StorageFillMaterialsBasic10
