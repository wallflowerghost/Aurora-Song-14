#EMERGENCY
- type: entity
  abstract: true
  id: StorageFillO2N2Random
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      entity_storage: !type:AllSelector
        children:
        - id: ClothingOuterSuitEmergency
        - id: ClothingMaskBreath
        - !type:GroupSelector
          children:
          - id: EmergencyOxygenTankFilled
            prob: 0.80
          - id: OxygenTankFilled
            prob: 0.20
        - !type:GroupSelector
          children:
          - id: EmergencyNitrogenTankFilled
            prob: 0.80
          - id: NitrogenTankFilled
            prob: 0.20
        - id: ToolboxEmergencyFilled
          prob: 0.4
        - id: MedkitOxygenFilled
          prob: 0.2
        - id: WeaponFlareGun
          prob: 0.05

