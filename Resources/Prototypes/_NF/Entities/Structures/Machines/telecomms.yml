- type: entity
  parent: TelecomServer
  id: NFTelecomServerFilled
  suffix: Filled All
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
      - EncryptionKeyCargo
      - EncryptionKeyEngineering
      - EncryptionKeyMedical
      - EncryptionKeyScience
      - EncryptionKeySecurity
      - EncryptionKeyService
      - EncryptionKeyCommand
      - EncryptionKeyNfsd
      - EncryptionKeyTraffic
      - EncryptionKeyShipboard # Aurora's Song - Added Shipboard key to shuttle server, so all ships can have short-range comms
      - EncryptionKeyGreeting
  - type: EncryptionKeyHolder
    keysExtractionMethod: Prying
    keySlots: 12 # Aurora's Song - Increased to 12 to fit all keys, including new Shipboard key

- type: entity
  parent: TelecomServer
  id: TelecomServerFilledNfsd
  suffix: Ship, NFSD
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
      - EncryptionKeyCargo
      - EncryptionKeyEngineering
      - EncryptionKeyMedical
      - EncryptionKeyScience
      - EncryptionKeySecurity
      - EncryptionKeyService
      - EncryptionKeyNfsd
      - EncryptionKeyTraffic

- type: entity
  parent: TelecomServer
  id: TelecomServerFilledShuttle
  suffix: Ship
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCommon
      - EncryptionKeyTraffic # Aurora's Song - Added Traffic key to shuttle server, to grant Shortband access
      - EncryptionKeyShipboard # Aurora's Song - Added Shipboard key to shuttle server, so all ships can have short-range comms
      - EncryptionKeyMedical

- type: entity
  parent: TelecomServer
  id: TelecomServerFilledSyndicate
