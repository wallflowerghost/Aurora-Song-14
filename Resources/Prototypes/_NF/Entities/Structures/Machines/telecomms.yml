  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeySyndie

- type: entity
  parent: TelecomServer
  id: TelecomServerFilledFreelance
  suffix: Freelance
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyFreelance
