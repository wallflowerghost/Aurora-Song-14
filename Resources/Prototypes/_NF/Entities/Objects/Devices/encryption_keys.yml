- type: entity
  parent: [EncryptionKey, RecyclableItemDeviceTiny]
  id: EncryptionKeyTraffic
  # Monolith - Change traffic to shortband, and description (logged by Aurora's Song)
  name: shortband encryption key
  description: An encryption key for the shortband channel. Limited to a 750 meters range. # CS - increase range 500 => 750
  components:
  - type: EncryptionKey
    channels:
    - Traffic
    defaultChannel: Traffic
  - type: Item
    sprite: _NF/Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: _NF/Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_gray
    - state: stc_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyNfsd
  name: NFSD encryption key
  categories: [ DoNotMap ]
  description: An encryption key for the New Frontier Sheriff's Department channel.
  components:
  - type: EncryptionKey
    channels: # Aurora Song - Changed from Nfsd to Sle (Sector Law Enforcement)
    - Sle
    defaultChannel: Sle
  - type: Item
    sprite: _NF/Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: _NF/Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_gray
    - state: nfsd_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyDoc
  name: medical dispatch encryption key
  categories: [ DoNotMap ]
  description: An encryption key for coordinating medical dispatch.
  components:
  - type: EncryptionKey
    channels:
    - Common
    - Medical
    - Greeting # Aurora's Song - Added Greeting, to allow medical command to help onboard
    - Command
    defaultChannel: Common
  - type: Item
    sprite: _NF/Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: _NF/Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_silver
    - state: cmo_label

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyGreeting
  name: greeting encryption key
  categories: [ DoNotMap ]
  description: An encryption key for the Frontier Outpost intercom.
  components:
  - type: EncryptionKey
    channels:
    - Greeting
    defaultChannel: Greeting
  - type: Item
    sprite: _NF/Objects/Devices/encryption_keys.rsi
  - type: Sprite
    sprite: _NF/Objects/Devices/encryption_keys.rsi
    layers:
    - state: crypt_gray
    - state: greeting_label
