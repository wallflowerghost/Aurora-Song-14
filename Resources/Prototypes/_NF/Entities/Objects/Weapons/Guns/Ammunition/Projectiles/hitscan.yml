# Pistols / SMGs
- type: entity
  id: NFRedLightLaser
  parent: BasicHitscan
  categories: [ HideSpawnMenu ]
  components:
  - type: HitscanBasicDamage
    damage:
      types:
        Heat: 14 #Damage Rebalanced | Aurora
  - type: HitscanBasicVisuals
    muzzleFlash: &lightMuzzleFlash
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: muzzle_laser
    travelFlash: &lightTravelFlash
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: beam
    impactFlash: &lightImpactFlash
      sprite: Objects/Weapons/Guns/Projectiles/projectiles.rsi
      state: impact_laser
  - type: HitscanBasicRaycast
    maxDistance: 21

