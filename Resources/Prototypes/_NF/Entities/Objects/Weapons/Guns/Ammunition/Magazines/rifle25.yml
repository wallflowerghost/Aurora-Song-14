    capacity: 20
  - type: Sprite
    sprite: _AS/Objects/Weapons/Guns/Ammunition/Magazine/CaselessRifle/caseless_rifle_mag_short.rsi # Aurora's Song - Added back rifle mags
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#ff0000"
  - type: MagazineVisuals
