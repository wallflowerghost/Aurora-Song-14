# Aurora - With the refactor from .25 caseless to .25 rifle, we need to update the magazine prototypes accordingly.
# Also Aurora - Fixed magazine rendering issues: corrected rubber sprite paths from _NF to base Objects path, added proper layered sprite
# system with base/mag/stripe for visual consistency, updated color to cyan (#00b0ff), added weapon compatibility tags,
# fixed in-hand visuals with proper left/right stripe overlays, and updated pistol mag state to mag-5 for better capacity visualization.
#region .25 Rifle mags | Aurora
- type: entity
  id: ASMagazinePistolCaselessRifle
  name: pistol magazine (.25 rifle)
  parent: BaseMagazinePistolCaselessRifle
  components:
  - type: Tag
    tags:
      - ASMagazinePistolCaselessRifle
  - type: BallisticAmmoProvider
    proto: NFCartridgeRifle25
    capacity: 10
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Magazine/CaselessRifle/caseless_pistol_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-5
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#ff0000"
  - type: MagazineVisuals
    magState: mag
    steps: 6
    zeroVisible: false
  - type: Appearance
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#ff0000"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#ff0000"

- type: entity
  id: ASMagazineCaselessRifle
  name: magazine (.25 rifle)
  parent: BaseMagazineCaselessRifle
  components:
  - type: Tag
    tags:
      - ASMagazineCaselessRifle
  - type: BallisticAmmoProvider
    proto: NFCartridgeRifle25
  - type: Sprite
    sprite: _AS/Objects/Weapons/Guns/Ammunition/Magazine/CaselessRifle/caseless_rifle_mag.rsi # Aurora's Song - Added back rifle mags
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#ff0000"
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#ff0000"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#ff0000"

- type: entity
  id: ASMagazineCaselessRifleShort
  name: short magazine (.25 rifle)
  parent: BaseMagazineCaselessRifle
  components:
  - type: Tag
    tags:
      - ASMagazineCaselessRifle
