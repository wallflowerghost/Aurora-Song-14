#region frame
- type: entity
  id: NFBaseWeaponFrameShotgun
  parent: [ NFBaseWeaponEncumbranceRifle, NFBaseItemWeaponGun ] # Encumberance adjusted | Aurora
  abstract: true
  components:
  - type: Sprite
    layers:
    - state: icon
      map: [ "enum.GunVisualLayers.Base" ]
  - type: Gun # Speed and angle adjusted | Aurora
    projectileSpeed: 30
    minAngle: 2
    maxAngle: 30
    angleIncrease: 3
    angleDecay: 3
    fireRate: 1.5
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/empty.ogg
  - type: StaticPrice
    price: 400
  - type: NFWeaponDetails
    class: weapon-details-class-shotgun

- type: entity
  id: NFBaseWeaponFrameShotgunWieldable
  parent: [ NFBaseWeaponEncumbranceRifle, NFBaseWeaponFrameShotgun ]
  abstract: true
  components:
  - type: Wieldable
    unwieldOnUse: false
  - type: GunRequiresWield
  - type: GunWieldBonus
    minAngle: -10.9
    maxAngle: -21.8

#region manufacturer
# Giving both NT and Gorlex shotguns their own unique frames to allow for future customization | Aurora
- type: entity
  id: NFBaseWeaponFrameShotgunNanotrasen
  parent: NFBaseWeaponFrameShotgunWieldable
  abstract: true
  components:
  - type: Gun
    minAngle: 6.8
    maxAngle: 26
    fireRate: 2.2
  - type: NFWeaponDetails
    manufacturer: weapon-details-manufacturer-nanotrasen-munitions

- type: entity
  id: NFBaseWeaponFrameShotgunGorlex
  parent: NFBaseWeaponFrameShotgunWieldable
  abstract: true
  components:
  - type: Gun
    minAngle: 6.8
    maxAngle: 35
    fireRate: 3
  - type: NFWeaponDetails
    manufacturer: weapon-details-manufacturer-nanotrasen-munitions

#region chamber
- type: entity
  id: NFBaseWeaponShotgunChamber12g # renamed from .50 to 12g | Aurora
  abstract: true
  components:
  - type: Gun
    examineCaliber: gun-examine-caliber-12g # renamed from .50 to 12g | Aurora
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
  - type: BallisticAmmoProvider
    capacity: 7
    proto: NFShellShotgunBuckshot
    whitelist:
      tags:
      - ShellShotgun
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
        ents: []

- type: entity
  parent: NFBaseItemWeaponGunMagazineFed
  id: NFBaseWeaponShotgunChamber12gMagazine # renamed from .50 to 12g | Aurora
  abstract: true
  components:
  - type: Sprite # janky here, but mag is optional and tied with chamber
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-0
      map: [ "enum.GunVisualLayers.Mag" ]
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Gun
    examineCaliber: gun-examine-caliber-12g # renamed from .50 to 12g | Aurora
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/shotgun.ogg
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: NFMagazineShotgunDrum
        priority: 2
        whitelist:
          tags:
          - MagazineShotgun
        whitelistFailPopup: gun-magazine-whitelist-fail
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
