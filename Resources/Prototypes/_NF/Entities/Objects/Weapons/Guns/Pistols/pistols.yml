#region WizDen
- type: entity
  id: NFWeaponPistolMk58
  parent: [ NFBaseWeaponPistolChamber35, NFBaseWeaponFramePistolNanotrasen ]
  name: mk58
  description: A cheap semiauto sidearm.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Pistols/mk58.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Pistols/mk58.rsi
  - type: NFWeaponDetails
  - type: PirateBountyItem
    id: WeaponPistolMk58

- type: entity
  id: NFWeaponPistolN1984
  parent: [ NFBaseWeaponPistolChamber45, NFBaseWeaponFramePistolNanotrasen ]
  name: N1984
  description: |- # Nod to user in testing | Aurora
    The sidearm of any self respecting logistics officer. On the handle is a label that says 'for authorized use only.'
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Pistols/N1984.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/Pistols/N1984.rsi

- type: entity
  id: NFWeaponPistolCobra
  parent: [ NFBaseWeaponPistolChamber25, NFBaseWeaponFramePistolCybersun ] # Back to being .25 | Aurora
  name: cobra
  description: |-
    A rugged, robust operator handgun with inbuilt silencer. An illegal firearm often used by Syndicate agents.
  components:
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/silenced.ogg
      params:
        volume: -8 # Quiet but not as quiet as upstream's upstream | Aurora
  - type: Sprite
    sprite: _NF/Objects/Weapons/Guns/Pistols/cobra.rsi
  - type: Clothing
    sprite: _NF/Objects/Weapons/Guns/Pistols/cobra.rsi

#region DeltaV
- type: entity
  id: NFWeaponPistolUniversal # Aurora's Song - .45 version moved to AS namespace, NF .35 version left for legacy purposes
  parent: [ NFBaseWeaponPistolChamber35, NFBaseWeaponFramePistolNanotrasen ]
  name: mk32 "Universal"
  description: The Mark 32 Offensive Handgun.
  categories: [ HideSpawnMenu ]
  components:
  - type: Gun
    minAngle: 1
    maxAngle: 15
    angleIncrease: 3
    angleDecay: 3
    fireRate: 3
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/universal.ogg
  - type: Sprite
    sprite: _DV/Objects/Weapons/Guns/Pistols/universal.rsi
  - type: Clothing
    sprite: _DV/Objects/Weapons/Guns/Pistols/universal.rsi

- type: entity
  id: NFWeaponPistolUniversalNfsd
  parent: [ BaseC2ContrabandUnredeemable, NFBaseWeaponPistolChamber35HighCapacityOverpressure, NFWeaponPistolUniversal ]
  name: mk32-M "Universal" service pistol
  description: |- # Aurora's Song - Adjusted description regarding .35 chambering
    The Mark 32 Offensive Service Pistol. Down-chambered to .35. On the handle is a label that says 'for authorized use only.'
  categories: [ HideSpawnMenu ]
  components: &universalComponents
  - type: Gun
    soundGunshot:
      path: /Audio/_DV/Weapons/Guns/Gunshots/universal.ogg

#region DeltaV: rubber
- type: entity
  id: NFWeaponPistolUniversalNfsdLessLethal
  parent: [ NFBaseWeaponPistolChamber35HighCapacityRubber, NFWeaponPistolUniversalNfsd ]
  suffix: Frontier, Less-lethal
  categories: [ HideSpawnMenu ]
  components: *universalComponents
