
#region WizDen
- type: entity
  id: NFWeaponLightMachineGunL6
  parent: [ NFBaseWeaponLightMachineGunChamber30, NFBaseWeaponFrameLightMachineGunGorlex ] # Parents updated to use correct chamber and frame | Aurora
  name: GSW LMG-6
  description: |-
    A rather traditionally made LMG with a pleasantly lacquered wooden pistol grip. An illegal firearm often used by Syndicate agents.
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true

- type: entity
  id: NFWeaponLightMachineGunL6C
  parent: [ NFBaseWeaponFrameLightMachineGunCyborg ] # AS: Made it not wieldable so its usable.
  name: cyborg GSW LMG-6
  description: |-
    A GSW LMG-6 for use by cyborgs. Creates rifle ammo on the fly from an internal ammo fabricator, which slowly self-charges. An illegal firearm often used by Syndicate agents.
  components:
  - type: Gun
    examineCaliber: gun-examine-caliber-30 # Updated to reflect correct caliber | Aurora
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/lmg.ogg
    soundEmpty:
      path: /Audio/Weapons/Guns/Empty/lmg_empty.ogg
  - type: Sprite
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: Clothing
    sprite: Objects/Weapons/Guns/LMGs/l6.rsi
  - type: BatteryAmmoProvider # Aurora's Song - ProjectileBatteryAmmoProvider>BatteryAmmoProvider
    proto: NFCartridgeRifle20
    fireCost: 100
  - type: Battery
    maxCharge: 10000
    startingCharge: 10000
  - type: BatterySelfRecharger
    autoRechargeRate: 25
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: true
  - type: NFWeaponDetails
    manufacturer: weapon-details-manufacturer-gorlex-steel-works

