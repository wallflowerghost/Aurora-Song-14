# region Full
- type: entity
  id: HappyHonkMcCargo
  parent: HappyHonk
  name: mccargo meal
  components:
  - type: Sprite
    sprite: _NF/Objects/Storage/Happyhonk/mccargo.rsi
    state: box
  - type: Item
    sprite: _NF/Objects/Storage/Happyhonk/mccargo.rsi
    heldPrefix: box
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:GroupSelector
        children:
        - id: MysteryFigureBox
          weight: 0.80
        - id: ClothingHeadHatMcCrown
          weight: 0.15
        - id: SpaceBladeMc
          weight: 0.05
  - type: StaticPrice
    price: 1
    vendPrice: 200 # Need this to not bug out the cardbox worth...

