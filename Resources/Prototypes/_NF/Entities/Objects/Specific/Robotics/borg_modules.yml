- type: entity
  id: BorgModuleAdvancedParamedic
  parent: [ BaseBorgModuleMedical, BaseProviderBorgModule ]
  name: chemical recovery cyborg module
  components:
  - type: Sprite
    layers:
    - state: medical
    - state: icon-paramedic
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands: # Aurora's Song - Replace with upstream hands
    - item: HandheldHealthAnalyzer # Aurora's Song: HandheldHealthAnalyzerUnpowered: HandheldHealthAnalyzer
    - item: BorgHypoTricordrazine
    - item: BorgHypoInaprovaline
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: adv-paramed-module }

- type: entity
  id: BorgModuleJetpack
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: Frontier cyborg module
  components:
  - type: Sprite
    layers:
    - state: generic
    - state: icon-jetpack
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands: # Aurora's Song - Replace with upstream hands
    - item: BorgHandheldGPSBasic
    - item: HandHeldMassScannerBorg
    - item: BorgClock
    - item: JetpackMiniFilled
      hand:
        emptyLabel: borg-placeholder-display-name-jetpack
        emptyRepresentative: JetpackMiniFilled
        whitelist:
          components:
          - Jetpack
    - hand:
        emptyRepresentative: SpaceCash1000
        whitelist:
          components:
          - Cash
    - hand:
        emptyRepresentative: FuelPlasma
        emptyLabel: borg-placeholder-display-name-fuel
        whitelist:
          components:
          - NFFuel
  - type: BorgModuleIcon
    icon: { sprite: _NF/Interface/Actions/actions_borg.rsi, state: jetpack-module }

