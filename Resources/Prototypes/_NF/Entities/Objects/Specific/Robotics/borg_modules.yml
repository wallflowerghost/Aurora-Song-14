# Service modules
- type: entity
  id: BorgModuleNFService
  parent: [ BaseBorgModuleService, BaseProviderBorgModule ]
  name: lounge cyborg module
  components:
  - type: Sprite
    layers:
    - state: service
    - state: icon-martini
      sprite: _NF/Objects/Specific/Robotics/borgmodule.rsi
  - type: ItemBorgModule
    hands:  # Aurora's Song - Replace with upstream hands
    - item: BarSpoon
    - item: DrinkShaker
      hand:
        whitelist:
          components:
          - NFShaker
    - item: Lighter
      hand:
        emptyLabel: borg-placeholder-display-name-lighter
        emptyRepresentative: Lighter
        whitelist:
          components:
          - NFLighter
    - hand:
        emptyLabel: borg-placeholder-display-name-smokes
        emptyRepresentative: CigPackRed
        whitelist:
          components:
          - NFSmokeableContainer
          tags:
          - Cigar
          - Cigarette
    - hand:
        emptyLabel: borg-placeholder-display-name-glassware
        emptyRepresentative: DrinkGlass
        whitelist:
          tags:
          - DrinkGlass
    - hand:
        emptyLabel: borg-placeholder-display-name-glassware
        emptyRepresentative: DrinkGlass
        whitelist:
          tags:
          - DrinkGlass
  - type: BorgModuleIcon
    icon: { sprite: Interface/Actions/actions_borg.rsi, state: service-module }

