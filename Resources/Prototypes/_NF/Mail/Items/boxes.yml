- type: entity
  name: Build-a-Buddy kit
  suffix: Human
  parent: BoxHug
  id: BoxBuildABuddyHuman
  description: "\"Henry the Human\" Build-a-Buddy kit. Some assembly required."
  components:
  - type: EntityTableContainerFill # Aurora's Song - StorageFill>EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children: # Aurora's Song - Migrate to nubody
        - id: OrganHumanHead
          amount: 1
        - id: OrganHumanTorso
          amount: 1
        - id: OrganHumanArmLeft
          amount: 1
        - id: OrganHumanArmRight
          amount: 1
        - id: OrganHumanHandLeft
          amount: 1
        - id: OrganHumanHandRight
          amount: 1
        - id: OrganHumanLegLeft
          amount: 1
        - id: OrganHumanLegRight
          amount: 1
        - id: OrganHumanFootLeft
          amount: 1
        - id: OrganHumanFootRight
          amount: 1
  - type: Storage
    grid:
    - 0,0,4,3
    whitelist:
      components:
        - Organ # Aurora's Song - BodyPart>Organ

