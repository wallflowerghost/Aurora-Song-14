- type: gameMap
  id: Nfsd
  mapName: 'NFSD Outpost'
  mapPath: /Maps/_NF/POI/nfsd.yml
  minPlayers: 0
  stations:
    Nfsd:
      stationProto: SecurityFrontierOutpost
      components:
        - type: StationNameSetup
          mapNameTemplate: 'NFSD Outpost'
        - type: ExtraStationInformation
          iconPath: /Textures/_AS/Icons/Stations/placeholder-banner.png # Aurora Song's - placeholder POI disabled
          stationSubtext: 'frontier-lobby-nfsd-subtext'
          stationDescription: 'frontier-lobby-nfsd-description'
          lobbySortOrder: 2
        - type: StationJobs
          availableJobs: # Aurora's Song - Switched NFSD to SLE roles, as fallback
            Commissioner: [ 1, 1 ]
            Lieutenant: [ 1, 1 ]
            Sergeant: [ 1, 1 ]
            Corpsman: [ 0, 0 ]
            ASDetective: [ 0, 0 ]
            Officer: [ 3, 3 ]
            Rookie: [ 0, 0 ]
            # Others:
            PublicAffairsLiaison: [ 1, 1 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
        - type: StationDeadDropReporting
          messageSet: Nfsd
        - type: StationDeadDropHintExempt
