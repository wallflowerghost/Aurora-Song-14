- type: job
  id: Pilot
  name: job-name-pilot
  description: job-description-pilot
  playTimeTracker: JobPilot
  requirements:
    - !type:OverallPlaytimeRequirement
      time: 43200
  startingGear: PilotGear # Aurora's Song - Added default gear
  icon: "JobIconPilot"
  supervisors: job-supervisors-hire
  weight: 2 # Prioritize station & department jobs
  displayWeight: 30 # Second from the top
  accessGroups: # Frontier
  - GeneralAccess
  special:
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: startingGear # Aurora's Song - Added to default grant Pilots encryption keys
  id: PilotGear
  encryptionKeys: # Aurora's Song - Added traffic and shipboard encryption keys
  - EncryptionKeyTraffic
  - EncryptionKeyShipboard

# Interview variant
- type: job
  id: PilotInterview
  name: job-name-pilot-interview
  description: job-description-pilot
  playTimeTracker: JobPilotInterview
  requirements:
    - !type:OverallPlaytimeRequirement
      time: 43200
  setPreference: false
  startingGear: PilotHologramGear
  icon: "JobIconPilot"
  supervisors: job-supervisors-hire
  accessGroups:
  - GeneralAccess
  jobEntity: InterviewHologramPilot
  newPlayerMessage: false

- type: startingGear
  id: PilotHologramGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitPilot
    shoes: ClothingShoesBootsPilot

- type: chameleonOutfit
  id: PilotChameleonOutfit
  job: Pilot
  equipment:
    head: ClothingHeadHatPilot
    mask: ClothingMaskPilot
    outerClothing: ClothingOuterCoatBomber
    gloves: ClothingHandsGlovesPilot
