- type: job
  id: Contractor
  name: job-name-contractor
  description: job-description-contractor
  playTimeTracker: JobPassenger
  startingGear: ContractorGear # Aurora's Song - Added default gear
  icon: "JobIconContractor"
  supervisors: job-supervisors-hire
  displayWeight: 40 # Top
  accessGroups:
  - GeneralAccess
  special:
  - !type:GiveItemOnHolidaySpecial
    holiday: FrontierBirthday
    prototype: FrontierBirthdayGift

- type: startingGear # Aurora's Song - Added to default grant Contractors encryption keys
  id: ContractorGear
  encryptionKeys: # Aurora's Song - Added traffic and shipboard encryption keys
  - EncryptionKeyTraffic
  - EncryptionKeyShipboard

# Interview variant
- type: job
  id: ContractorInterview
  name: job-name-contractor-interview
  description: job-description-contractor
  playTimeTracker: JobContractorInterview
  startingGear: ContractorHologramGear
  icon: "JobIconContractor"
  supervisors: job-supervisors-hire
  accessGroups:
  - GeneralAccess
  jobEntity: InterviewHologramContractor
  newPlayerMessage: false

- type: startingGear
  id: ContractorHologramGear
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorGrey
    shoes: ClothingShoesColorBlack

- type: chameleonOutfit
  id: ContractorChameleonOutfit
  job: Contractor
