- type: entity
  parent: [ OrganBaseBrain, OrganSlimePersonInternal, OrganSlimePersonMetabolizer ]
  id: OrganSlimePersonCore
  name: sentient slime core
  components:
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 50.0
# Aurora's Song - edible, grindable organs
      food:
        maxVol: 10
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
        - ReagentId: GreyMatter
          Quantity: 5
# Aurora's Song edit ends
  - type: Stomach
  - type: Metabolizer
    maxReagents: 6
    metabolizerTypes: [ Slime ]
    stages: [ Digestion, Bloodstream, Metabolites ]

- type: entity
  parent: [ OrganBaseLungs, OrganSlimePersonInternal, OrganSlimePersonMetabolizer ]
  id: OrganSlimePersonLungs
  name: gas sacs
  components:
  - type: Lung
    alert: LowNitrogen
