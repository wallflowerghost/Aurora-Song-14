- type: markingsGroup
  parent: Undergarments
  id: Slime
  limits:
    enum.HumanoidVisualLayers.Hair:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.FacialHair:
      limit: 1
      required: false
    # Aurora's Song Start - Buncha new stuff
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: false
    enum.HumanoidVisualLayers.Head:
      limit: 1
      required: true
      default: [SlimeHead] # Aurora's Song | Base head marking to allow for animal heads
    enum.HumanoidVisualLayers.HeadTop:
      limit: 2
      required: false
    enum.HumanoidVisualLayers.HeadSide:
      limit: 2
      required: false
    # Aurora's Song End
    enum.HumanoidVisualLayers.Chest:
      limit: 4 # imp 2<4
      required: false
    enum.HumanoidVisualLayers.LArm:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.RArm:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.LHand:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.RHand:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.LLeg:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.RLeg:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.LFoot:
      limit: 8 # Aurora: 1>8
      required: false
    enum.HumanoidVisualLayers.RFoot:
      limit: 8 # Aurora: 1>8
      required: false
  appearances:
    enum.HumanoidVisualLayers.Hair:
      layerAlpha: 0.75 # imp 0.72<0.75
      matchSkin: true
    enum.HumanoidVisualLayers.FacialHair:
      layerAlpha: 0.75 # imp 0.72<0.75
      matchSkin: true
    # Aurora's Song Start
    enum.HumanoidVisualLayers.Snout:
      layerAlpha: 0.75 # imp 0.72<0.75
      matchSkin: true
    enum.HumanoidVisualLayers.HeadTop:
      matchSkin: true
#    enum.HumanoidVisualLayers.HeadSide: # imp
#      layerAlpha: 0.75 # imp 0.72<0.75
#      matchSkin: true
    enum.HumanoidVisualLayers.Tail:
      matchSkin: true
    # Aurora's Song End

- type: entity
  parent: BaseSpeciesAppearance
  id: AppearanceSlimePerson
  name: SlimePerson appearance
  components:
  - type: Inventory
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Human/displacement.rsi
            state: jumpsuit-female
  - type: InitialBody
    organs:
      Torso: OrganSlimePersonTorso
      Head: OrganSlimePersonHead
      ArmLeft: OrganSlimePersonArmLeft
      ArmRight: OrganSlimePersonArmRight
      HandRight: OrganSlimePersonHandRight
      HandLeft: OrganSlimePersonHandLeft
      LegLeft: OrganSlimePersonLegLeft
      LegRight: OrganSlimePersonLegRight
      FootLeft: OrganSlimePersonFootLeft
      FootRight: OrganSlimePersonFootRight
      Brain: OrganSlimePersonCore
      Lungs: OrganSlimePersonLungs
  - type: HumanoidProfile
    species: SlimePerson

- type: entity
  parent:
  - AppearanceSlimePerson
  - BaseSpeciesMobOrganic
  id: MobSlimePerson
  name: Urist McWobble
  components:
  - type: Storage
    clickInsert: false
    grid:
    - 0,0,1,2
    maxItemSize: Large
    storageInsertSound:
      path: /Audio/Voice/Slime/slime_squish.ogg
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
        ents: []
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.HumanoidMarkingModifierKey.Key:
        type: HumanoidMarkingModifierBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: UseDelay
    delay: 0.5
  - type: Speech
    speechVerb: Slime
    speechSounds: Slime
    allowedEmotes: ['Squish', 'Bubble', 'Pop'] # Imp: add Bubble, Pop
  - type: TypingIndicator
    proto: slime
  - type: Vocal
    sounds:
      Male: MaleSlime
      Female: FemaleSlime
      Unsexed: MaleSlime
  - type: Damageable
    damageModifierSet: Slime
  - type: PassiveDamage # Around 8 damage a minute healed
    allowedStates:
    - Alive
    damageCap: 65
    damage:
      types:
        Heat: -0.14
        Blunt: -0.05
        Piercing: -0.05
        Slash: -0.05
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#2cf274"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: Bloodstream
    bloodReferenceSolution: # TODO Color slime blood based on their slime color or smth
      reagents:
      - ReagentId: Slime
        Quantity: 300
  - type: Barotrauma
    damage:
      types:
        Blunt: 0.50 #per second, scales with pressure and other constants.
        Heat: 0.2 # 0.1 more than humans, i feel like low pressure would make slime boil more than blunt stretch them so i decided on this instead.
  - type: Reactive
    groups:
      Flammable: [ Touch ]
      Extinguish: [ Touch ]
    reactions:
    - reagents: [ Water, SpaceCleaner ]
      methods: [ Touch ]
      effects:
      - !type:WashCreamPie
    - reagents: [ Water ]
      methods: [ Touch ]
      effects:
      - !type:HealthChange
        damage:
          types:
            Heat: 1 # Aurora's Song 0.05>1
      - !type:PopupMessage
        type: Local
        visualType: Large
        messages: [ "slime-hurt-by-water-popup" ]
        probability: 0.25
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatSlime
      amount: 5
  - type: Respirator
    damage:
      types:
        Asphyxiation: 0.2
    damageRecovery:
      types:
        Asphyxiation: -1.0
    maxSaturation: 15
  - type: SnoutHelmet # Aurora's Song - Animal Slimes

- type: entity
  parent: OrganBase
  id: OrganSlimePerson
  abstract: true
  suffix: slime person

- type: entity
  id: OrganSlimePersonMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Slime ]

- type: entity
  parent: OrganSlimePerson
  id: OrganSlimePersonInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Slime/organs.rsi

- type: entity
  parent: OrganSlimePerson
  id: OrganSlimePersonExternal
  abstract: true
  components:
