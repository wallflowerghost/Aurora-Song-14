    sprite: Mobs/Species/Slime/parts.rsi
  - type: VisualOrgan
    data:
      sprite: Mobs/Species/Slime/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Slime

- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganSlimePersonExternal ]
  id: OrganSlimePersonTorso

- type: entity
  parent: [ OrganBaseHead, OrganSlimePersonExternal ]
  id: OrganSlimePersonHead
  components: # Aurora's Song - We have custom slime heads
  - type: VisualOrgan
    data:
      sprite: null
      state: null
  # Aurora's Song Start - Correct hideable head layers
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.FacialHair
    - enum.HumanoidVisualLayers.Snout
  # Aurora's Song End

