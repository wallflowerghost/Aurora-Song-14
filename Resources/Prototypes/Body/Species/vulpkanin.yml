    speciesId: vulpkanin
    # Aurora's Song - Remove displacements entirely

- type: entity
  parent:
  - AppearanceVulpkanin
  - BaseSpeciesMobOrganic
  id: MobVulpkanin
  name: Urist McArfArf
  components:
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#cf0000" # Aurora's Song - set vulpkanin damage overlay back to red to match their red blood
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  #  - type: MessyDrinker # starcup
  #    spillChance: 0.33
  - type: Speech
    speechSounds: Vulpkanin
    speechVerb: Vulpkanin
    allowedEmotes: [ 'Bark', 'Snarl', 'Whine', 'Howl', 'Growl' ]
  - type: Vocal
    sounds:
      Male: MaleVulpkanin
      Female: FemaleVulpkanin
      Unsexed: MaleVulpkanin
  - type: Damageable
    damageModifierSet: Vulpkanin
  - type: MeleeWeapon
    soundHit:
      path: /Audio/Weapons/pierce.ogg
    animation: WeaponArcClaw
    damage:
      types:
        Piercing: 2
        Slash: 3
  - type: DogVision # Aurora's Song - Add back missing traits
  - type: Temperature
    specificHeat: 44
  - type: TemperatureDamage
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold: 0.05 # Per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 2.5 # Per second, scales with temperature & other constants
  - type: Wagging
    action: ActionToggleWaggingVulpkanin
  - type: TemperatureProtection
    heatingCoefficient: 1.2
    coolingCoefficient: 0.3
