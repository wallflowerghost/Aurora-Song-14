            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: outerclothing
      gloves:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: hand
      shoes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: shoes
    displacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: jumpsuit-male
      back:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: back
      outerClothing:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: outerclothing
      gloves:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: hand
      shoes:
        sizeMaps:
          32:
            sprite: Mobs/Species/Moth/displacement.rsi
            state: shoes
  - type: InitialBody
    organs:
      Torso: OrganMothTorso
      Head: OrganMothHead
      ArmLeft: OrganMothArmLeft
      ArmRight: OrganMothArmRight
      HandRight: OrganMothHandRight
      HandLeft: OrganMothHandLeft
      LegLeft: OrganMothLegLeft
      LegRight: OrganMothLegRight
      FootLeft: OrganMothFootLeft
      FootRight: OrganMothFootRight
      Brain: OrganMothBrain
      Eyes: OrganMothEyes
      Tongue: OrganMothTongue
      Appendix: OrganMothAppendix
      Ears: OrganMothEars
      Lungs: OrganMothLungs
      Heart: OrganMothHeart
      Stomach: OrganMothStomach
      Liver: OrganMothLiver
      Kidneys: OrganMothKidneys
  - type: HumanoidProfile
    species: Moth
  # Aurora's Song - imp added some layer changes here but upstream has them organized differently now, it should be better

- type: entity
  parent:
  - AppearanceMoth
  - BaseSpeciesMobOrganic
  id: MobMoth
  name: Urist McFluff
  components:
  - type: Damageable
    damageModifierSet: Moth
  - type: ZombieAccentOverride
    accent: zombieMoth
  - type: Speech
    speechVerb: Moth
    speechSounds: Moth # Frontier: upstream#37297
    allowedEmotes: ['Chitter', 'Squeak', 'Flap', "Flutter"] # Aurora's Song - Add fairy flutter
  - type: TypingIndicator
    proto: moth
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: InsectBlood
        Quantity: 300
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: Mobs/Effects/brute_damage.rsi
        color: "#808A51"
      Burn:
        sprite: Mobs/Effects/burn_damage.rsi
  - type: MothAccent
  - type: Vocal
    sounds:
      Male: UnisexMoth
      Female: UnisexMoth
      Unsexed: UnisexMoth
  - type: BodyEmotes
    soundsId: MothBodyEmotes
  - type: MovementSpeedModifier
    baseWeightlessAcceleration: 1.5 # Move around more easily in space.
    baseWeightlessFriction: 1
    baseWeightlessModifier: 1
  - type: Flammable
    damage:
      types:
        Heat: 2.5 # moths burn more easily
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 46
  - type: TemperatureDamage # Moths hate the heat and thrive in the cold.
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold: 0.05 # per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 3 # per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      289: 0.9
      275: 0.8
      250: 0.7
  - type: FluffyWhitelist # Frontier

