# Aurora: add flatpacks
- type: entity
  parent: BaseFlatpack
  id: FTLDriveFlatpack
  name: CTLA-25 bluespace drive flatpack
  description: A flatpack used for constructing a CTLA-25 bluespace drive.
  components:
  - type: Sprite
    layers:
    - state: base
    - state: overlay
      color: "#DE3A3A"
      map: ["enum.FlatpackVisualLayers.Overlay"]
    - state: icon-default
  - type: Flatpack
    entity: MachineFTLDrive
  - type: StaticPrice
    price: 1700

