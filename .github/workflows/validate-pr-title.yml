name: 'Lint PR'

on:
  pull_request_target:
    types:
    - opened
    - reopened
    - edited
    - synchronize
    - reopened
    - converted_to_draft
    - ready_for_review
    - review_requested

jobs:
  main:
    name: Validate PR title
    runs-on: ubuntu-slim
    permissions:
      pull-requests: read
    steps:
    - uses: amannn/action-semantic-pull-request@v6
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
